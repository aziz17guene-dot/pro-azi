        ];

        function App() {
            const [view, setView] = useState('dashboard');
            const [menuOpen, setMenuOpen] = useState(false);
            const [showInstall, setShowInstall] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [products, setProducts] = useState(() => storage.get(KEYS.PRODUCTS, INITIAL_PRODUCTS));
            const [sales, setSales] = useState(() => storage.get(KEYS.SALES));
            const [expenses, setExpenses] = useState(() => storage.get(KEYS.EXPENSES));
            const [shop, setShop] = useState(() => {
                const params = new URLSearchParams(window.location.search);
                let shopId = params.get('shop');
                if (!shopId && window.location.hash) {
                    const hash = window.location.hash.slice(1);
                    if (hash.startsWith('shop-')) shopId = hash.replace('shop-', '');
                }
                if (shopId) {
                    const shops = storage.get(KEYS.SHOPS, []);
                    const found = shops.find(s => s.id === shopId || s.id === Number(shopId));
                    if (found) return found;
                }
                return storage.get(KEYS.SHOP, null);
            });
            const [autoPrint, setAutoPrint] = useState(() => storage.get('ma_market_autoprint_v3', true));
            const [logs, setLogs] = useState(() => storage.get('ma_market_logs_v3', []));
            const [activities, setActivities] = useState(() => storage.get('ma_market_activity_v3', []));
            const [globalReceipt, setGlobalReceipt] = useState(null);
            const [users, setUsers] = useState(() => storage.get(KEYS.USERS, []));
            const [currentUser, setCurrentUser] = useState(() => storage.get(KEYS.CURRENT_USER, null));
            const [suppliers, setSuppliers] = useState(() => storage.get(KEYS.SUPPLIERS, []));
            const [purchases, setPurchases] = useState(() => storage.get(KEYS.PURCHASES, []));
            const [customers, setCustomers] = useState(() => storage.get(KEYS.CUSTOMERS, []));
            const [audit, setAudit] = useState(() => storage.get(KEYS.AUDIT, []));
            const [shops, setShops] = useState(() => storage.get(KEYS.SHOPS, []));

            // Persistance
            useEffect(() => { storage.set(KEYS.PRODUCTS, products); }, [products]);
            useEffect(() => { storage.set(KEYS.SALES, sales); }, [sales]);
            useEffect(() => { storage.set(KEYS.EXPENSES, expenses); }, [expenses]);
            useEffect(() => { storage.set(KEYS.SHOP, shop); }, [shop]);
            useEffect(() => { storage.set('ma_market_autoprint_v3', autoPrint); }, [autoPrint]);
            useEffect(() => { storage.set('ma_market_logs_v3', logs); }, [logs]);
            useEffect(() => { storage.set('ma_market_activity_v3', activities); }, [activities]);
            useEffect(() => { storage.set(KEYS.USERS, users); }, [users]);
            useEffect(() => { storage.set(KEYS.CURRENT_USER, currentUser); }, [currentUser]);
            useEffect(() => { storage.set(KEYS.SUPPLIERS, suppliers); }, [suppliers]);
            useEffect(() => { storage.set(KEYS.PURCHASES, purchases); }, [purchases]);
            useEffect(() => { storage.set(KEYS.CUSTOMERS, customers); }, [customers]);
            useEffect(() => { storage.set(KEYS.AUDIT, audit); }, [audit]);
            useEffect(() => { storage.set(KEYS.SHOPS, shops); }, [shops]);

            useEffect(() => { if (window.lucide) { try { window.lucide.createIcons(); } catch (e) {} } });

            useEffect(() => {
                const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); setShowInstall(true); };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstall = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { setDeferredPrompt(null); setShowInstall(false); showToast("Application installée !", "success"); }
            };

            // ================================================================
            // CHARGEMENT PROGRESSIF DES DONNÉES
            // ================================================================
            useEffect(() => {
                // Simuler un chargement asynchrone avec un petit délai
                // pour permettre à l'interface de s'afficher
                const timer = setTimeout(() => {
                    setProducts(storage.get(KEYS.PRODUCTS, INITIAL_PRODUCTS));
                    setSales(storage.get(KEYS.SALES));
                    setExpenses(storage.get(KEYS.EXPENSES));
                    setSuppliers(storage.get(KEYS.SUPPLIERS, []));
                    setPurchases(storage.get(KEYS.PURCHASES, []));
                    setCustomers(storage.get(KEYS.CUSTOMERS, []));
                    setAudit(storage.get(KEYS.AUDIT, []));
                    setUsers(storage.get(KEYS.USERS, []));
                    setShops(storage.get(KEYS.SHOPS, []));
                    setIsLoading(false);
                }, 100);
                return () => clearTimeout(timer);
            }, [shop?.id]);

            const isEmployee = currentUser && currentUser.role === 'employee';
            const userPerms = currentUser ? (currentUser.role === 'admin' ? ALL_PERMS : (currentUser.permissions || DEFAULT_EMP_PERMS)) : [];
            const can = (p) => userPerms.includes(p);

            const logAudit = (action, details = '') => {
                setAudit(prev => [{ id: Date.now(), date: new Date().toISOString(), userId: currentUser?.id, userName: currentUser?.name || 'Système', action, details }, ...prev].slice(0, 2000));
            };

            const onSale = (s) => {
                const stamped = { ...s, sellerId: currentUser?.id || null, sellerName: currentUser?.name || 'Admin', sellerRole: currentUser?.role || 'admin' };
                setSales([stamped, ...sales]);
                setLogs(prev => [{ date: stamped.date, profit: stamped.profit, total: stamped.total, sellerName: stamped.sellerName }, ...prev].slice(0, 500));
                setActivities(prev => [{ ...stamped, logId: Date.now() }, ...prev].slice(0, 200));
                setProducts(prev => prev.map(p => {
                    const item = stamped.items.find(it => it.pid === p.id);
                    if (!item) return p;
                    return { ...p, stock: Number((p.stock - item.qtyBase).toFixed(3)) };
                }));
                if (stamped.customerId) {
                    const pts = Math.floor(stamped.total / 1000);
                    setCustomers(prev => prev.map(c => c.id === stamped.customerId ? { ...c, points: (c.points || 0) + pts, totalSpent: (c.totalSpent || 0) + stamped.total, lastVisit: stamped.date } : c));
                }
                logAudit('VENTE', `#${stamped.num} - ${stamped.total} F${stamped.payMethod==='credit'?' (CRÉDIT)':''}`);
                setGlobalReceipt({ ...stamped, _auto: autoPrint });
            };

            const addProduct = (p) => { setProducts([p, ...products]); logAudit('PRODUIT_AJOUT', p.name); };
            const updateProduct = (p) => { setProducts(prev => prev.map(x => x.id === p.id ? p : x)); logAudit('PRODUIT_MODIF', p.name); };
            const deleteProduct = (id) => { setProducts(p => p.filter(x => x.id !== id)); logAudit('PRODUIT_SUPPR', id); };

            const receivePurchase = (po) => {
                setProducts(prev => prev.map(p => {
                    const line = po.items.find(i => i.pid === p.id);
                    if (!line) return p;
                    const oldStock = Number(p.stock) || 0;
                    const totStock = oldStock + line.qty;
                    return { ...p, stock: Number((totStock).toFixed(3)) };
                }));
                setPurchases(prev => [{ ...po, id: Date.now(), date: new Date().toISOString(), receivedBy: currentUser?.name }, ...prev]);
                logAudit('REAPPRO', `${po.supplierName} - ${po.items.length} ligne(s)`);
            };

            const navigate = (v) => { setView(v); setMenuOpen(false); };
            const logout = () => { logAudit('LOGOUT'); setCurrentUser(null); setView('dashboard'); };

            // Gestion des utilisateurs
            const hasData = products.length > 0 || sales.length > 0 || suppliers.length > 0 || customers.length > 0;

            if (isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50">
                        <div className="text-center">
                            <div className="loader-spinner mx-auto mb-4"></div>
                            <p className="text-slate-600 font-bold text-lg">Chargement des données...</p>
                            <p className="text-slate-400 text-sm mt-1">Veuillez patienter</p>
                        </div>
                    </div>
                );
            }

            if (!shop) return <ShopSetup onComplete={(s) => { setShop(s); setShops([s]); }} storage={storage} />;
            if (!users.length && !hasData) {
                return <FirstAdminSetup onComplete={(u) => { setUsers([u]); setCurrentUser(u); }} />;
            }
            if (!currentUser) {
                return <AuthScreen users={users} onLogin={(u) => { 
                    setCurrentUser(u); 
                    setAudit(prev => [{ id: Date.now(), date: new Date().toISOString(), userId: u.id, userName: u.name, action: 'LOGIN', details: '' }, ...prev]); 
                }} shop={shop} />;
            }

            const visibleSales = (isEmployee && !can('history_all')) ? sales.filter(s => s.sellerId === currentUser.id) : sales;
            const visibleActivities = (isEmployee && !can('history_all')) ? activities.filter(a => a.sellerId === currentUser.id) : activities;
            const viewPermMap = { dashboard:'reports', pos:'pos', stock:'stock_view', history:'pos', expenses:'expenses', debt:'debt', reports:'reports', employees:'employees', settings:'settings', suppliers:'suppliers', customers:'customers', audit:'audit', activities:'pos' };
            const canSeeView = (v) => currentUser.role === 'admin' || can(viewPermMap[v] || v);
            const effectiveView = canSeeView(view) ? view : 'pos';

            const handleManualSync = () => {
                showToast('Synchronisation en cours...', 'info');
                setTimeout(() => showToast('Synchronisation terminée ✅', 'success'), 2000);
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row relative">
                    {menuOpen && <div onClick={() => setMenuOpen(false)} className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90] md:hidden" />}
                    <nav className={`fixed inset-y-0 left-0 w-64 bg-slate-900 p-4 flex flex-col gap-1 border-r border-slate-800 z-[100] transition-transform duration-300 md:relative md:translate-x-0 ${menuOpen ? 'translate-x-0' : '-translate-x-full'} print:hidden text-slate-400 overflow-y-auto`}>
                        {showInstall && <button onClick={handleInstall} className="w-full py-2 px-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white text-[10px] font-black uppercase rounded-lg mb-3 hover:shadow-lg">⬇️ Installer l'app</button>}
                        <div className="p-4 mb-4 bg-slate-800/50 rounded-2xl border border-slate-700/50 flex justify-between items-center gap-3">
                            <div className="flex items-center gap-3 min-w-0">
                                {shop?.logo ? <img src={shop.logo} alt="logo" className="w-12 h-12 rounded-xl object-cover border border-slate-700 shrink-0" /> : <div className="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center text-white font-black shrink-0"><Icon name="store" size={22}/></div>}
                                <div className="min-w-0"><h1 className="text-white font-black text-base truncate">{shop?.name || 'AZIZ-PRO'}</h1><p className="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Gestion Boutique</p></div>
                            </div>
                            <button onClick={() => setMenuOpen(false)} className="md:hidden text-white shrink-0"><Icon name="x" /></button>
                        </div>
                        <div className={`p-3 mb-4 rounded-2xl border flex items-center gap-3 ${isEmployee ? 'bg-amber-900/30 border-amber-700/40' : 'bg-emerald-900/30 border-emerald-700/40'}`}>
                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black text-white ${isEmployee ? 'bg-amber-600' : 'bg-emerald-600'}`}><Icon name={isEmployee ? 'user' : 'shield'} size={18} /></div>
                            <div className="flex-1 min-w-0"><p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">{isEmployee ? 'Caissier' : 'Administrateur'}</p><p className="text-white font-bold text-sm truncate">{currentUser.name}</p></div>
                            <button onClick={logout} title="Déconnexion" className="p-2 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg"><Icon name="log-out" size={16}/></button>
                        </div>
                        {canSeeView('dashboard') && <NavItem active={effectiveView==='dashboard'} icon="layout-dashboard" label="Tableau de Bord" onClick={()=>navigate('dashboard')} />}
                        {canSeeView('pos') && <NavItem active={effectiveView==='pos'} icon="shopping-cart" label="Caisse (Ventes)" onClick={()=>navigate('pos')} />}
                        {canSeeView('stock') && <NavItem active={effectiveView==='stock'} icon="package" label={can('stock_edit')||currentUser.role==='admin' ? "Stock & Produits" : "Consulter Stock"} onClick={()=>navigate('stock')} badge={products.filter(p => p.stock <= p.minStock).length} />}
                        {canSeeView('suppliers') && <NavItem active={effectiveView==='suppliers'} icon="truck" label="Fournisseurs" onClick={()=>navigate('suppliers')} />}
                        {canSeeView('history') && <NavItem active={effectiveView==='history'} icon="history" label={isEmployee && !can('history_all') ? "Mes Ventes" : "Historique"} onClick={()=>navigate('history')} />}
                        {canSeeView('expenses') && <NavItem active={effectiveView==='expenses'} icon="credit-card" label="Dépenses" onClick={()=>navigate('expenses')} />}
                        {canSeeView('debt') && <NavItem active={effectiveView==='debt'} icon="coins" label="Dettes Clients" onClick={()=>navigate('debt')} />}
                        {canSeeView('customers') && <NavItem active={effectiveView==='customers'} icon="user-circle" label="Clients & Fidélité" onClick={()=>navigate('customers')} />}
                        {canSeeView('reports') && <NavItem active={effectiveView==='reports'} icon="bar-chart-3" label="Bilans & Inventaire" onClick={()=>navigate('reports')} />}
                        {canSeeView('activities') && <NavItem active={effectiveView==='activities'} icon="list-checks" label={isEmployee ? "Mes Reçus" : "Journal d'Activité"} onClick={()=>navigate('activities')} />}
                        {canSeeView('audit') && <NavItem active={effectiveView==='audit'} icon="shield-check" label="Audit" onClick={()=>navigate('audit')} />}
                        {canSeeView('employees') && <NavItem active={effectiveView==='employees'} icon="users" label="Employés" onClick={()=>navigate('employees')} />}
                        {canSeeView('settings') && <NavItem active={effectiveView==='settings'} icon="settings" label="Paramètres" onClick={()=>navigate('settings')} />}
                    </nav>

                    <main className="flex-1 h-screen overflow-y-auto p-4 md:p-8 custom-scroll bg-slate-50 relative print:hidden">
                        <header className="flex md:hidden items-center justify-between p-2 mb-4 bg-white rounded-2xl border border-slate-100 shadow-sm sticky top-0 z-40">
                            <button onClick={() => setMenuOpen(true)} className="p-3 bg-slate-900 text-white rounded-xl"><Icon name="menu" /></button>
                            <div className="text-right"><h3 className="text-xs font-black uppercase tracking-tighter">{shop.name}</h3><p className="text-[8px] font-bold text-blue-500 uppercase">{currentUser.name} • {effectiveView}</p></div>
                        </header>

                        <ExpiryAlertBanner products={products} />

                        {effectiveView === 'dashboard' && canSeeView('dashboard') && <Dashboard products={products} sales={sales} expenses={expenses} />}
                        {effectiveView === 'pos' && <POS products={products} onSale={onSale} autoPrint={autoPrint} setAutoPrint={setAutoPrint} customers={customers} setCustomers={setCustomers} />}
                        {effectiveView === 'stock' && <Stock items={products} onAdd={addProduct} onEdit={updateProduct} onDelete={deleteProduct} onGoToSale={() => setView('pos')} readOnly={!can('stock_edit') && currentUser.role !== 'admin'} />}
                        {effectiveView === 'suppliers' && canSeeView('suppliers') && <Suppliers suppliers={suppliers} setSuppliers={setSuppliers} purchases={purchases} products={products} onReceive={receivePurchase} />}
                        {effectiveView === 'history' && <History sales={visibleSales} setSales={setSales} setProducts={setProducts} onPrint={setGlobalReceipt} readOnly={isEmployee} />}
                        {effectiveView === 'expenses' && canSeeView('expenses') && <Expenses list={expenses} set={setExpenses} shopId={shop?.id} />}
                        {effectiveView === 'debt' && canSeeView('debt') && <Debt sales={sales} setSales={setSales} />}
                        {effectiveView === 'customers' && canSeeView('customers') && <Customers customers={customers} setCustomers={setCustomers} sales={sales} />}
                        {effectiveView === 'reports' && canSeeView('reports') && <Reports sales={sales} expenses={expenses} products={products} logs={logs} users={users} />}
                        {effectiveView === 'activities' && <ActivityLogs activities={visibleActivities} logs={isEmployee ? logs.filter(l => l.sellerName === currentUser.name) : logs} onPrint={setGlobalReceipt} showSeller={!isEmployee} />}
                        {effectiveView === 'audit' && canSeeView('audit') && <AuditView audit={audit} />}
                        {effectiveView === 'employees' && canSeeView('employees') && <Employees users={users} setUsers={setUsers} sales={sales} currentUser={currentUser} />}
                        {effectiveView === 'settings' && canSeeView('settings') && <Settings storage={storage} products={products} sales={sales} expenses={expenses} shop={shop} setShop={setShop} shops={shops} setShops={setShops} logs={logs} activities={activities} suppliers={suppliers} purchases={purchases} customers={customers} audit={audit} logout={logout} currentUser={currentUser} onManualSync={handleManualSync} />}
                    </main>

                    {globalReceipt && <ReceiptModal data={globalReceipt} onClose={() => setGlobalReceipt(null)} shop={shop} />}
                    <CloudStatusPill />
                    <InstallAppButton />
                    <ToastContainer />
                </div>
            );
        }

        // ================================================================
        // RENDU FINAL
        // ================================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
