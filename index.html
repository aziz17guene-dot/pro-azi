        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print { @page { margin: 0; size: auto; } html, body { background: white !important; margin: 0 !important; padding: 0 !important; height: auto !important; overflow: visible !important; } #root { display: block !important; } nav, main, header, .print\:hidden, button, .receipt-buttons { display: none !important; visibility: hidden !important; } .receipt-modal-container { display: block !important; visibility: visible !important; position: static !important; width: 100% !important; background: white !important; padding: 0 !important; margin: 0 !important; z-index: auto !important; } .receipt-modal-container > div { box-shadow: none !important; border: none !important; max-width: 100% !important; width: 100% !important; border-radius: 0 !important; padding: 5mm !important; } .receipt-content, .receipt-content * { color: black !important; visibility: visible !important; } }
        .toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
        #error-display { position: fixed; bottom: 0; left: 0; right: 0; background: #dc2626; color: white; padding: 10px; text-align: center; font-weight: bold; z-index: 10000; display: none; }
        #splash { position: fixed; inset: 0; z-index: 99999; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease-out; }
        #splash.hidden { opacity: 0; pointer-events: none; }
        #splash .logo { width: 100px; height: 100px; background: #2563eb; border-radius: 28px; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: 900; color: white; box-shadow: 0 20px 60px rgba(37,99,235,0.4); animation: pulse 1.5s ease-in-out infinite; }
        #splash h1 { color: white; font-size: 28px; font-weight: 900; margin-top: 24px; letter-spacing: -0.5px; }

        @media (max-width: 480px) { .toast { font-size: 10px; padding: 10px 16px; bottom: 80px; } #splash .logo { width: 60px; height: 60px; font-size: 32px; border-radius: 20px; } #splash h1 { font-size: 18px; } }

            height: 48px;

            border-radius: 50%;

<body>
    <div id="splash"><div class="logo">🕌</div><h1>Aziz-Pro</h1><p>GESTION BOUTIQUE</p><div class="loader"></div></div>
    <div id="root"></div>
    <div id="error-display"></div>

    <script>
    // ================================================================
    // SPLASH SCREEN
    // ================================================================
    (function() {
        const splash = document.getElementById('splash');
        if (splash) {
            setTimeout(() => {
                splash.classList.add('hidden');
                setTimeout(() => { splash.style.display = 'none'; }, 600);
            }, 1200);
            document.addEventListener('touchstart', () => {
                if (!splash.classList.contains('hidden')) {
                    splash.classList.add('hidden');
                    setTimeout(() => { splash.style.display = 'none'; }, 600);
                }
            }, { once: true });
        }
    })();

    window.onerror = function(msg, url, line, col, error) {
        const el = document.getElementById('error-display');
        if (el) { el.style.display = 'block'; el.textContent = '⚠️ ' + msg + ' (ligne ' + line + ')'; setTimeout(() => { el.style.display = 'none'; }, 8000); }
        console.error('Erreur globale:', msg, error);
        return true;
    };

    window.__deferredInstall = null;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); window.__deferredInstall = e; window.dispatchEvent(new CustomEvent('aziz-install-available')); });
    window.addEventListener('appinstalled', () => { window.__deferredInstall = null; });
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // ================================================================
        // CONSTANTES
        // ================================================================
        const KEYS = {
            PRODUCTS: 'ma_market_p_v3',
            SALES: 'ma_market_s_v3',
            EXPENSES: 'ma_market_e_v3',
            SHOP: 'ma_market_shop_v3',
            USERS: 'ma_market_users_v3',
            CURRENT_USER: 'ma_market_current_user_v3',
            SUPPLIERS: 'ma_market_sup_v3',
            PURCHASES: 'ma_market_pur_v3',
            CUSTOMERS: 'ma_market_cust_v3',
            AUDIT: 'ma_market_audit_v3',
            SHOPS: 'ma_market_shops_v3',
            ARCHIVED_SALES: 'ma_market_archived_sales_v3',
            ARCHIVED_BENEFITS: 'ma_market_archived_benefits_v3'
        };

        const ALL_PERMS = ['pos','stock_view','stock_edit','history_all','expenses','debt','reports','suppliers','customers','employees','settings','audit'];
        const DEFAULT_EMP_PERMS = ['pos','stock_view','history_own'];
        const STOCK_PAGE_SIZE = 50;

        // ================================================================
        // UTILITAIRES
        // ================================================================
        const roundTo = (val, d = 2) => { if (!Number.isFinite(val)) return 0; const f = Math.pow(10, d); return Math.round((val + Number.EPSILON) * f) / f; };
        const generateBarcode = () => { const base = ('200' + Date.now().toString().slice(-9)).slice(0, 12); let sum = 0; for (let i = 0; i < 12; i++) sum += Number(base[i]) * (i % 2 === 0 ? 1 : 3); const check = (10 - (sum % 10)) % 10; return base + check; };
        const hashPwd = (str) => { let h = 0; const s = 'mam_salt_' + (str || ''); for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; } return String(h); };

        // ================================================================
        // STORAGE
        // ================================================================
        const storage = {
            get: (k, def = []) => {
                try {
                    const data = localStorage.getItem(k);
                    return data ? JSON.parse(data) : def;
                } catch { return def; }
            },
            set: (k, v) => {
                try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
            }
        };

        // ================================================================
        // TOAST
        // ================================================================
        function showToast(message, type = 'info', duration = 3000) {
            const event = new CustomEvent('aziz-toast', { detail: { message, type, duration } });
            window.dispatchEvent(event);
        }

        function ToastContainer() {
            const [toasts, setToasts] = useState([]);
            useEffect(() => {
                const handler = (e) => {
                    const { message, type, duration } = e.detail;
                    const id = Date.now();
                    setToasts(prev => [...prev, { id, message, type }]);
                    setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, duration || 3000);
                };
                window.addEventListener('aziz-toast', handler);
                return () => window.removeEventListener('aziz-toast', handler);
            }, []);
            if (toasts.length === 0) return null;
            return (
                <div className="toast-container">
                    {toasts.map(t => (
                        <div key={t.id} className={`toast ${t.type}`}>{t.message}</div>
                    ))}
                </div>
            );
        }

        // ================================================================
        // ICON
        // ================================================================
        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    try { window.lucide.createIcons(); } catch (e) {}
                }
            }, [name, size]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }} ref={ref}></i>;
        };

        // ================================================================
        // BARCODE
        // ================================================================
        const Barcode = ({ value, height = 50, displayValue = true, className = '' }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current || !value || !window.JsBarcode) return;
                try {
                    window.JsBarcode(ref.current, String(value), {
                        format: 'CODE128', height, displayValue,
                        fontSize: 12, margin: 4, background: '#ffffff'
                    });
                } catch (e) {}
            }, [value, height, displayValue]);
            if (!value) return null;
            return <svg ref={ref} className={className}></svg>;
        };

        // ================================================================
        // STOCK MANAGER
        // ================================================================
        class StockManager {
            constructor(product) {
                if (!product) { this.baseStock = 0; this.baseUnit = 'Unité'; this.variants = []; return; }
                this.baseStock = Number(product.stock) || 0;
                this.baseUnit = product.baseUnit || 'Unité';
                this.variants = product.variants || [];
            }
            canSell(variant, qty) {
                if (!variant || qty <= 0) return false;
                return this.baseStock >= roundTo(variant.coefficient * qty, 3) - 0.001;
            }
            deduct(variant, qty) {
                if (!this.canSell(variant, qty)) return null;
                return Math.max(0, roundTo(this.baseStock - roundTo(variant.coefficient * qty, 3), 3));
            }
            getBreakdown() {
                try {
                    const s = this.baseStock;
                    if (s < 0) return { text: 'Stock négatif!' };
                    const vs = (this.variants || []).filter(v => Number(v.coefficient) > 0);
                    const subV = vs.filter(v => Number(v.coefficient) < 1).sort((a, b) => Number(a.coefficient) - Number(b.coefficient))[0];
                    if (!subV) return { text: `${roundTo(s)} ${this.baseUnit}` };
                    const wholes = Math.floor(s + 0.0001);
                    const frac = roundTo(s - wholes);
                    const subQty = roundTo(frac / Number(subV.coefficient), 3);
                    const text = subQty > 0 ? `${wholes} ${this.baseUnit} + ${roundTo(subQty)} ${subV.label}` : `${wholes} ${this.baseUnit}`;
                    return { text };
                } catch (e) { return { text: 'Erreur stock' }; }
            }
        }

        const stockBreakdown = (p) => { try { if (!p) return { text: '0' }; return new StockManager(p).getBreakdown(); } catch { return { text: 'Erreur' }; } };

        // ================================================================
        // PAGINATION
        // ================================================================
        function usePaginatedStock(products) {
            const [page, setPage] = useState(0);
            const [searchTerm, setSearchTerm] = useState('');
            const filtered = useMemo(() => {
                if (!searchTerm.trim()) return products;
                const q = searchTerm.toLowerCase().trim();
                return products.filter(p => p.name.toLowerCase().includes(q) || (p.barcode || '').includes(q));
            }, [products, searchTerm]);
            const totalPages = Math.max(1, Math.ceil(filtered.length / STOCK_PAGE_SIZE));
            const currentPage = Math.min(page, totalPages - 1);
            const start = currentPage * STOCK_PAGE_SIZE;
            const end = Math.min(start + STOCK_PAGE_SIZE, filtered.length);
            return { pageItems: filtered.slice(start, end), currentPage, totalPages, setPage, searchTerm, setSearchTerm, totalItems: filtered.length };
        }

        // ================================================================
        // BARCODE SCANNER
        // ================================================================
        function BarcodeScanner({ onDetected, onClose }) {
            useEffect(() => {
                if (!window.Html5Qrcode) { showToast("Scanner non disponible", "error"); onClose(); return; }
                const scanner = new window.Html5Qrcode("bc-reader");
                scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                    scanner.stop().then(() => onDetected(txt));
                }, () => {}).catch(e => {
                    showToast("Caméra inaccessible", "error");
                    onClose();
                });
                return () => { try { scanner.stop().catch(()=>{}); } catch(e){} };
            }, []);
            return (
                <div className="fixed inset-0 z-[300] bg-black/90 flex flex-col items-center justify-center p-4">
                    <div className="bg-white rounded-3xl p-4 w-full max-w-md">
                        <div className="flex justify-between items-center mb-3"><h3 className="font-black uppercase text-sm">Scanner</h3><button onClick={onClose} className="p-2 bg-slate-100 rounded-lg"><Icon name="x" size={16}/></button></div>
                        <div id="bc-reader" className="w-full"></div>
                        <p className="text-[10px] text-slate-400 text-center mt-2 font-bold uppercase">Pointez la caméra</p>
                    </div>
                </div>
            );
        }

        // ================================================================
        // NAV ITEM
        // ================================================================
        function NavItem({ active, icon, label, onClick, badge }) {
            return (
                <button onClick={onClick} className={`flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all active:scale-95 w-full ${active ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800'} relative`}>
                    <Icon name={icon} /> {label}
                    {badge > 0 && <span className="absolute right-2 top-1/2 -translate-y-1/2 bg-red-600 text-[8px] text-white px-2 py-1 rounded-full">{badge}</span>}
                </button>
            );
        }

        // ================================================================
        // STAT CARD
        // ================================================================
        function StatCard({ label, val, color, bg, icon }) {
            return (
                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                    <div><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{label}</p><p className={`text-2xl font-black ${color}`}>{val}</p></div>
                    <div className={`p-3 rounded-xl ${bg} ${color}`}><Icon name={icon} /></div>
                </div>
            );
        }

        // ================================================================
        // DASHBOARD
        // ================================================================
        function Dashboard({ products, sales, expenses }) {
            const active = sales.filter(s => s.status === 'active');
            const totalRec = active.reduce((s, x) => s + x.total, 0);
            const profitSales = active.reduce((s, x) => s + x.profit, 0);
            let profitArchived = 0;
            try { profitArchived = JSON.parse(localStorage.getItem(KEYS.ARCHIVED_BENEFITS) || '[]').reduce((s, x) => s + (x.benefit || 0), 0); } catch {}
            const profitTotal = profitSales + profitArchived;
            const totalExp = expenses.reduce((s, x) => s + x.amount, 0);
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Tableau de Bord</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4">
                        <StatCard label="Recettes Totales" val={`${totalRec.toLocaleString()} F`} color="text-green-600" bg="bg-green-100" icon="trending-up" />
                        <StatCard label="Bénéfice Net" val={`${(profitTotal - totalExp).toLocaleString()} F`} color="text-blue-600" bg="bg-blue-100" icon="wallet" />
                        <StatCard label="Dépenses" val={`${totalExp.toLocaleString()} F`} color="text-red-500" bg="bg-red-100" icon="credit-card" />
                        <StatCard label="Dettes à Recouvrer" val={`${sales.filter(s => s.payMethod === 'credit' && s.status === 'active').reduce((s,x)=>s+x.total, 0).toLocaleString()} F`} color="text-orange-600" bg="bg-orange-100" icon="coins" />
                        <StatCard label="Alertes Stock" val={products.filter(p => p.stock <= p.minStock).length} color="text-orange-600" bg="bg-orange-100" icon="alert-triangle" />
                    </div>
                </div>
            );
        }

        // ================================================================
        // RECEIPT MODAL
        // ================================================================
        function ReceiptModal({ data, onClose, shop }) {
            useEffect(() => {
                if (data._auto) {
                    const timer = setTimeout(() => window.print(), 400);
                    return () => clearTimeout(timer);
                }
            }, [data._auto]);

            return (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-md receipt-modal-container">
                    <div className="bg-white w-full max-w-[340px] rounded-3xl p-6 shadow-2xl flex flex-col max-h-[90vh] overflow-y-auto custom-scroll">
                        <div className="receipt-content text-black">
                            <div className="text-center border-b-2 border-black pb-2 mb-4">
                                <h1 className="font-black text-lg uppercase leading-tight">{shop?.name || 'MACHA ALLAH MARKET'}</h1>
                                <p className="text-[9px] font-bold uppercase tracking-tight">{shop?.address}</p>
                                <p className="text-[11px] font-black">📞 {shop?.phone}</p>
                            </div>
                            <div className="text-[10px] font-mono mb-4 border-b border-black border-dashed pb-2">
                                <div className="flex justify-between uppercase"><span>N°</span><b>#{data.num}</b></div>
                                <div className="flex justify-between uppercase"><span>Date</span><span>{new Date(data.date).toLocaleDateString('fr-FR')} {new Date(data.date).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})}</span></div>
                                {data.customer && <div className="flex justify-between uppercase"><span>Client</span><b>{data.customer}</b></div>}
                                {data.sellerName && <div className="flex justify-between uppercase"><span>Caissier</span><b>{data.sellerName}</b></div>}
                            </div>
                            <table className="w-full text-[10px] font-mono mb-4">
                                <thead className="border-b border-black"><tr><th className="pb-1 text-left uppercase">Art.</th><th className="pb-1 text-center">Qté</th><th className="pb-1 text-right">Total</th></tr></thead>
                                <tbody className="divide-y divide-black divide-dotted">
                                    {data.items.map((it, i) => (
                                        <tr key={i}>
                                            <td className="py-1"><div className="font-bold uppercase leading-tight">{it.pname}</div><div className="text-[8px] italic">{it.vlabel} @ {it.price}F</div></td>
                                            <td className="py-1 text-center font-bold">x{it.q}</td>
                                            <td className="py-1 text-right font-bold">{it.total.toLocaleString()}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            <div className="text-[10px] font-mono border-t-2 border-black pt-3 space-y-2">
                                <div className="flex justify-between px-1"><span className="uppercase">BRUT</span><span>{(data.subtotal || data.total + data.discount).toLocaleString()} F</span></div>
                                {data.discount > 0 && <div className="flex justify-between font-black p-2 rounded-lg border-2 border-black/20 my-2 bg-slate-50"><span className="uppercase font-bold">REMISE</span><span className="font-black text-[12px]">-{data.discount.toLocaleString()} F</span></div>}
                                <div className="flex justify-between font-black text-sm border-y-2 border-black py-3 uppercase bg-slate-100 px-2 shadow-inner"><span>NET</span><span>{data.total.toLocaleString()} F</span></div>
                                <div className="flex justify-between pt-1"><span className="uppercase">Paiement</span><b className="uppercase">{data.payMethod === 'cash' ? 'Espèces' : 'Crédit'}</b></div>
                            </div>
                            <div className="text-center mt-6 text-[9px] font-black uppercase italic leading-tight space-y-1">
                                <p className="border-t border-black border-dashed pt-2">🙏 Repassez nous voir !</p>
                                <p>Al-Hamdoulillah !</p>
                                <p className="text-[8px] not-italic font-bold opacity-70">Aziz-Pro • 67 41 09 46</p>
                            </div>
                        </div>
                        <div className="flex flex-col gap-2 mt-6 print:hidden receipt-buttons">
                            <button onClick={() => window.print()} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black flex items-center justify-center gap-3 text-xs uppercase shadow-xl hover:scale-[1.02] active:scale-95 transition-all">
                                <Icon name="printer" size={18} /> Imprimer
                            </button>
                            <button onClick={onClose} className="w-full py-3 bg-slate-100 text-slate-500 rounded-2xl font-black text-[10px] uppercase hover:bg-slate-200 transition-colors">Fermer</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ================================================================
        // POS (CAISSE) - simplifié mais complet
        // ================================================================
        function POS({ products, onSale, autoPrint, setAutoPrint, customers = [], setCustomers }) {
            const [search, setSearch] = useState('');
            const [cart, setCart] = useState([]);
            const [payMethod, setPayMethod] = useState('cash');
            const [customer, setCustomer] = useState('');
            const [customerId, setCustomerId] = useState('');
            const [received, setReceived] = useState('');
            const [mobileAmount, setMobileAmount] = useState('');
            const [mobileProvider, setMobileProvider] = useState('Wave');
            const [discount, setDiscount] = useState('');
            const [scanning, setScanning] = useState(false);

            const filtered = useMemo(() => {
                if (!search.trim()) return products;
                const q = search.toLowerCase().trim();
                return products.filter(p => p.name.toLowerCase().includes(q) || (p.barcode || '').includes(q));
            }, [search, products]);

            const subtotal = cart.reduce((s, it) => s + (it.price * it.q), 0);
            const discountVal = Number(discount) || 0;
            const totalAmount = subtotal - discountVal;
            const cashPart = Number(received) || 0;
            const mobilePart = Number(mobileAmount) || 0;
            const totalPaid = payMethod === 'mixed' ? cashPart + mobilePart : payMethod === 'cash' ? cashPart : payMethod === 'mobile' ? mobilePart : 0;
            const changeAmount = (payMethod === 'cash' || payMethod === 'mixed') ? Math.max(0, totalPaid - totalAmount) : 0;

            const addToCart = useCallback((p, v) => {
                if (p.stock < v.coefficient) { showToast("Stock insuffisant !", "error"); return; }
                setCart(prev => {
                    const existing = prev.find(x => x.pid === p.id && x.vid === v.id);
                    if (existing) return prev.map(x => (x.pid === p.id && x.vid === v.id) ? { ...x, q: x.q + 1 } : x);
                    const unitCost = Number((p.purchasePrice * v.coefficient).toFixed(2));
                    return [...prev, { pid: p.id, pname: p.name, vid: v.id, vlabel: v.label, price: v.price, coef: v.coefficient, q: 1, unitCost }];
                });
            }, []);

            const onScanned = (code) => {
                setScanning(false);
                const p = products.find(x => x.barcode === code);
                if (!p) return showToast("Code-barres inconnu", "error");
                if (!p.variants || !p.variants.length) return showToast("Produit sans variante", "error");
                addToCart(p, p.variants[0]);
            };

            const validate = useCallback(() => {
                if (!cart.length) return showToast("Panier vide", "warning");
                if (payMethod !== 'credit' && totalPaid < totalAmount) return showToast("Montant insuffisant", "error");

                const grossSubtotal = cart.reduce((s, it) => s + it.price * it.q, 0) || 1;
                const items = cart.map(it => {
                    const prod = products.find(x => x.id === it.pid);
                    const unitCost = it.unitCost != null ? it.unitCost : (prod ? Number((prod.purchasePrice * it.coef).toFixed(2)) : 0);
                    const lineGross = it.price * it.q;
                    const lineDiscount = Number(((discountVal || 0) * (lineGross / grossSubtotal)).toFixed(2));
                    const lineNet = Number((lineGross - lineDiscount).toFixed(2));
                    const lineCost = Number((unitCost * it.q).toFixed(2));
                    const lineProfit = Number((lineNet - lineCost).toFixed(2));
                    return { ...it, unitCost, total: lineGross, lineDiscount, lineNet, lineCost, lineProfit, qtyBase: Number((it.q * it.coef).toFixed(3)) };
                });

                const totalProfit = Number(items.reduce((s, it) => s + (it.lineProfit || 0), 0).toFixed(2));

                const sale = {
                    id: Date.now(),
                    num: Date.now().toString().slice(-6),
                    date: new Date().toISOString(),
                    items,
                    subtotal: Number(subtotal.toFixed(2)),
                    discount: discountVal,
                    total: Number(totalAmount.toFixed(2)),
                    received: payMethod === 'credit' ? 0 : Number(totalPaid.toFixed(2)),
                    change: changeAmount,
                    payMethod,
                    payments: payMethod === 'mixed' ? [{ type: 'cash', amount: cashPart }, { type: 'mobile', provider: mobileProvider, amount: mobilePart }] :
                              payMethod === 'mobile' ? [{ type: 'mobile', provider: mobileProvider, amount: mobilePart }] :
                              payMethod === 'cash' ? [{ type: 'cash', amount: cashPart }] :
                              [{ type: 'credit', amount: totalAmount }],
                    customer: customer || (customers.find(c => c.id === customerId)?.name || ''),
                    customerId: customerId || null,
                    profit: totalProfit,
                    status: 'active'
                };

                onSale(sale);
                setCart([]);
                setCustomer('');
                setCustomerId('');
                setReceived('');
                setMobileAmount('');
                setDiscount('');
                showToast("Vente #" + sale.num + " ✅", "success");
            }, [cart, payMethod, totalPaid, totalAmount, discountVal, subtotal, cashPart, mobilePart, mobileProvider, customer, customerId, customers, onSale]);

            return (
                <div className="flex flex-col lg:flex-row gap-6 h-full print:hidden">
                    <div className="flex-1 flex flex-col gap-4 overflow-hidden">
                        <div className="relative flex gap-2">
                            <div className="flex-1 relative">
                                <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="Rechercher..." value={search} onChange={e => setSearch(e.target.value)} className="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl shadow-sm outline-none" />
                            </div>
                            <button onClick={()=>setScanning(true)} className="px-4 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase flex items-center gap-1"><Icon name="scan-line" size={16}/>Scan</button>
                        </div>
                        {scanning && <BarcodeScanner onClose={()=>setScanning(false)} onDetected={onScanned} />}
                        <div className="flex-1 overflow-y-auto grid grid-cols-2 md:grid-cols-3 gap-3 custom-scroll pr-1">
                            {filtered.map(p => (
                                <div key={p.id} className={`bg-white p-3 rounded-2xl border shadow-sm flex flex-col justify-between hover:border-blue-500 transition-colors ${p.stock <= p.minStock ? 'border-orange-200 bg-orange-50/30' : 'border-slate-100'}`}>
                                    <div>
                                        <div className="flex justify-between items-start mb-1">
                                            <h4 className="font-bold text-xs truncate flex-1">{p.name}</h4>
                                            {p.stock <= p.minStock && <span className="text-orange-600" title="Stock Faible"><Icon name="alert-triangle" size={14}/></span>}
                                        </div>
                                        <p className={`text-[10px] font-bold leading-tight ${p.stock <= p.minStock ? 'text-orange-600' : 'text-slate-500'}`}>Stock : {stockBreakdown(p).text}</p>
                                    </div>
                                    <div className="mt-3 space-y-1">
                                        {(p.variants && p.variants.length ? p.variants : [{ id: 'default', label: p.baseUnit || 'Unité', coefficient: 1, price: p.salePrice }]).map(v => (
                                            <button key={v.id} onClick={() => addToCart(p, v)} className="w-full text-left py-2 px-3 bg-slate-50 hover:bg-blue-600 hover:text-white rounded-lg flex justify-between items-center transition-all text-[10px] font-black uppercase">
                                                <span>{v.label}</span>
                                                <span>{Number(v.price).toLocaleString()} F</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="w-full lg:w-96 bg-white rounded-3xl border border-slate-100 shadow-xl flex flex-col overflow-hidden">
                        <div className="p-6 bg-slate-900 text-white flex justify-between items-center">
                            <h3 className="font-bold text-xs uppercase tracking-widest">Panier Actuel</h3>
                            <span className="bg-blue-600 px-2 rounded-full text-[10px]">{cart.length}</span>
                        </div>
                        <div className="flex-1 p-6 space-y-3 overflow-y-auto custom-scroll">
                            {cart.map((it, i) => (
                                <div key={i} className="flex justify-between items-center text-sm border-b pb-2">
                                    <div><p className="font-bold text-xs">{it.pname}</p><p className="text-[10px] text-slate-400">{it.vlabel} x {it.q}</p></div>
                                    <div className="flex items-center gap-3">
                                        <span className="font-black">{(it.price * it.q).toLocaleString()} F</span>
                                        <button onClick={() => setCart(c => c.filter((_, idx) => idx !== i))} className="text-red-400"><Icon name="trash-2" size={14}/></button>
                                    </div>
                                </div>
                            ))}
                            {!cart.length && <p className="text-center py-20 text-slate-300 italic">Panier vide.</p>}
                        </div>
                        <div className="p-6 bg-slate-50 border-t space-y-3">
                            <div className="grid grid-cols-4 gap-1">
                                <button onClick={() => setPayMethod('cash')} className={`py-2 rounded-lg text-[9px] font-black uppercase ${payMethod==='cash'?'bg-blue-600 text-white':'bg-white border'}`}>Cash</button>
                                <button onClick={() => setPayMethod('mobile')} className={`py-2 rounded-lg text-[9px] font-black uppercase ${payMethod==='mobile'?'bg-purple-600 text-white':'bg-white border'}`}>Mobile</button>
                                <button onClick={() => setPayMethod('mixed')} className={`py-2 rounded-lg text-[9px] font-black uppercase ${payMethod==='mixed'?'bg-emerald-600 text-white':'bg-white border'}`}>Mixte</button>
                                <button onClick={() => setPayMethod('credit')} className={`py-2 rounded-lg text-[9px] font-black uppercase ${payMethod==='credit'?'bg-orange-600 text-white':'bg-white border'}`}>Crédit</button>
                            </div>

                            <div className="grid grid-cols-2 gap-2">
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Remise (F)</label>
                                    <input type="number" placeholder="0" value={discount} onChange={e => setDiscount(e.target.value)} className="w-full p-2 border rounded-xl outline-none text-xs font-bold text-red-500" />
                                </div>
                                {(payMethod === 'cash' || payMethod === 'mixed') && (
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Espèces (F)</label>
                                        <input type="number" placeholder="0" value={received} onChange={e => setReceived(e.target.value)} className="w-full p-2 border rounded-xl outline-none text-xs font-bold text-green-600" />
                                    </div>
                                )}
                            </div>

                            {(payMethod === 'mobile' || payMethod === 'mixed') && (
                                <div className="grid grid-cols-2 gap-2">
                                    <select value={mobileProvider} onChange={e=>setMobileProvider(e.target.value)} className="p-2 border rounded-xl text-xs font-bold">
                                        <option>Wave</option><option>Orange Money</option><option>Free Money</option><option>Wizall</option>
                                    </select>
                                    <input type="number" placeholder="Montant mobile" value={mobileAmount} onChange={e=>setMobileAmount(e.target.value)} className="p-2 border rounded-xl text-xs font-bold text-purple-600"/>
                                </div>
                            )}

                            {(customers.length > 0 || payMethod === 'credit') && (
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Client (fidélité / crédit)</label>
                                    <select value={customerId} onChange={e=>{ setCustomerId(e.target.value); setCustomer(''); }} className="w-full p-2 border rounded-xl text-[10px] font-bold">
                                        <option value="">— Aucun / saisir nom —</option>
                                        {customers.map(c => <option key={c.id} value={c.id}>{c.name} ({c.points||0} pts)</option>)}
                                    </select>
                                    {!customerId && <input placeholder="Ou nom du client" value={customer} onChange={e=>setCustomer(e.target.value)} className="w-full p-2 border rounded-xl text-[10px] font-bold mt-1"/>}
                                </div>
                            )}

                            <div className="pt-2 border-t border-slate-200">
                                <div className="flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase">
                                    <span>Sous-Total</span>
                                    <span>{subtotal.toLocaleString()} F</span>
                                </div>
                                <div className="flex justify-between items-center font-black mt-1">
                                    <span className="text-xs text-slate-800 uppercase italic">Net à Payer</span>
                                    <span className="text-xl text-blue-600">{totalAmount.toLocaleString()} F</span>
                                </div>
                                {(payMethod === 'cash' || payMethod === 'mixed') && totalPaid > 0 && (
                                    <div className="flex justify-between text-[10px] font-bold uppercase mt-1">
                                        <span className="text-slate-400">Rendu :</span>
                                        <span className="text-green-600 font-black">{changeAmount.toLocaleString()} F</span>
                                    </div>
                                )}
                            </div>
                        
                            <div className="flex items-center justify-between p-3 bg-blue-50 rounded-xl border border-blue-100 mb-2 mt-2">
                                <div className="flex items-center gap-2">
                                    <Icon name="printer" size={14} className="text-blue-600" />
                                    <span className="text-[10px] font-black uppercase text-blue-800">Impression Automatique</span>
                                </div>
                                <button onClick={() => setAutoPrint(!autoPrint)} className={`w-10 h-5 rounded-full relative transition-all duration-300 ${autoPrint ? 'bg-blue-600' : 'bg-slate-300'}`}>
                                    <div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all duration-300 ${autoPrint ? 'left-6' : 'left-1'}`}></div>
                                </button>
                            </div>

                            <button onClick={validate} disabled={!cart.length} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 disabled:bg-slate-200">Encaisser & Imprimer</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ================================================================
        // STOCK - OPTIMISÉ AVEC CHARGEMENT PROGRESSIF
        // ================================================================
        function Stock({ items, onAdd, onEdit, onDelete, onGoToSale, readOnly }) {
            const [showModal, setShowModal] = useState(false);
            const [editing, setEditing] = useState(null);
            const [form, setForm] = useState({ name: '', category: 'Alimentaire', purchasePrice: '', salePrice: '', stock: '', baseUnit: 'Litre', minStock: '5', barcode: '', expiryDate: '' });
            const [variants, setVariants] = useState([{ id: 'v1', label: 'Unité (Base)', coefficient: 1, price: '' }]);
            const [scanning, setScanning] = useState(false);
            const { pageItems, currentPage, totalPages, setPage, searchTerm, setSearchTerm, totalItems } = usePaginatedStock(items);

            const openAdd = () => {
                setEditing(null);
                setForm({ name: '', category: 'Alimentaire', purchasePrice: '', salePrice: '', stock: '', baseUnit: 'Litre', minStock: '5', barcode: '', expiryDate: '' });
                setVariants([{ id: 'v1', label: 'Unité (Base)', coefficient: 1, price: '' }]);
                setShowModal(true);
            };

            const openEdit = (p) => {
                setEditing(p);
                setForm({ ...p, barcode: p.barcode || '', expiryDate: p.expiryDate || '' });
                setVariants(p.variants || [{ id: 'v1', label: 'Unité (Base)', coefficient: 1, price: '' }]);
                setShowModal(true);
            };

            const save = () => {
                if (!form.name || !form.purchasePrice || !form.salePrice) {
                    showToast("Remplissez les champs obligatoires !", "error");
                    return;
                }
                const product = {
                    ...form,
                    id: editing ? editing.id : Date.now().toString(),
                    purchasePrice: Number(form.purchasePrice) || 0,
                    salePrice: Number(form.salePrice) || 0,
                    stock: Number(form.stock) || 0,
                    minStock: Number(form.minStock) || 0,
                    variants: variants.map(v => ({ ...v, coefficient: Number(v.coefficient) || 1, price: Number(v.price) || 0 }))
                };
                try {
                    if (editing) onEdit(product);
                    else onAdd(product);
                    setShowModal(false);
                    showToast(editing ? "Produit modifié" : "Produit ajouté", "success");
                } catch (e) {
                    showToast("Erreur lors de l'enregistrement", "error");
                }
            };

            const addVar = (l = '', c = '') => setVariants([...variants, { id: Date.now().toString(), label: l, coefficient: c, price: '' }]);
            const updVar = (id, f, v) => setVariants(prev => prev.map(x => x.id === id ? { ...x, [f]: v } : x));

            return (
                <div className="space-y-6">
                    <header className="flex justify-between items-center flex-wrap gap-2">
                        <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Gestion du Stock</h2>
                        <div className="flex gap-2 flex-wrap">
                            <button onClick={onGoToSale} className="px-6 py-3 bg-green-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                                <Icon name="shopping-cart" size={16}/> Nouvelle Vente
                            </button>
                            {!readOnly && (
                                <button onClick={openAdd} className="px-6 py-3 bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                                    <Icon name="plus" size={16}/> Nouveau Produit
                                </button>
                            )}
                        </div>
                    </header>

                    <div className="flex gap-2 items-center bg-white p-2 rounded-2xl border">
                        <Icon name="search" size={16} className="text-slate-400 ml-2"/>
                        <input 
                            value={searchTerm} 
                            onChange={e => { setSearchTerm(e.target.value); setPage(0); }} 
                            placeholder="Rechercher (nom ou code-barres)..." 
                            className="flex-1 p-2 outline-none font-bold text-sm" 
                        />
                        <button onClick={() => setScanning(true)} className="px-3 py-2 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase flex items-center gap-1">
                            <Icon name="scan-line" size={14}/> Scanner
                        </button>
                        <span className="text-xs text-slate-400 ml-2">{totalItems} produits</span>
                    </div>

                    {scanning && <BarcodeScanner onClose={()=>setScanning(false)} onDetected={(code)=>{ setScanning(false); const found = items.find(p => p.barcode === code); if (found) openEdit(found); else { setSearchTerm(code); showToast("Aucun produit avec ce code", "warning"); } }} />}

                    <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b tracking-widest leading-none sticky top-0">
                                    <tr>
                                        <th className="p-6">Désignation</th>
                                        <th>Catégorie</th>
                                        <th>Stock Physique</th>
                                        {!readOnly && <th>P. Achat</th>}
                                        <th>P. Vente Base</th>
                                        {!readOnly && <th className="text-right p-6">Actions</th>}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm font-bold">
                                    {pageItems.length === 0 && <tr><td colSpan="6" className="p-10 text-center text-slate-400 italic">Aucun produit trouvé</td></tr>}
                                    {pageItems.map(p => {
                                        const breakdown = stockBreakdown(p);
                                        return (
                                            <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="p-6">{p.name}</td>
                                                <td className="text-[10px] text-slate-400">{p.category}</td>
                                                <td>
                                                    <span className={`inline-block px-3 py-1 rounded-xl text-[10px] leading-tight ${p.stock <= p.minStock ? 'bg-red-50 text-red-600' : 'bg-slate-50 text-slate-700'}`}>
                                                        {breakdown.text}
                                                    </span>
                                                </td>
                                                {!readOnly && <td className="text-xs">{p.purchasePrice} F</td>}
                                                <td className="font-black text-blue-600">{p.salePrice} F</td>
                                                {!readOnly && (
                                                    <td className="p-6 text-right flex justify-end gap-2 text-slate-400">
                                                        <button onClick={() => openEdit(p)} className="p-2 hover:bg-blue-50 hover:text-blue-600 rounded-lg"><Icon name="edit" size={16}/></button>
                                                        <button onClick={() => confirm("Supprimer ce produit ?") && onDelete(p.id)} className="p-2 hover:bg-red-50 hover:text-red-600 rounded-lg"><Icon name="trash-2" size={16}/></button>
                                                    </td>
                                                )}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>

                        {totalPages > 1 && (
                            <div className="flex items-center justify-between px-6 py-4 border-t bg-slate-50/50">
                                <div className="text-sm text-slate-500">Page {currentPage + 1} / {totalPages} ({totalItems} produits)</div>
                                <div className="flex gap-2">
                                    <button onClick={() => setPage(p => Math.max(0, p - 1))} disabled={currentPage === 0} className="px-4 py-2 bg-white border rounded-lg text-sm font-bold disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-50 transition-colors">◀ Précédent</button>
                                    <button onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))} disabled={currentPage >= totalPages - 1} className="px-4 py-2 bg-white border rounded-lg text-sm font-bold disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-50 transition-colors">Suivant ▶</button>
                                </div>
                            </div>
                        )}
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-2xl rounded-[40px] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-900 text-white">
                                    <h3 className="text-xl font-black uppercase tracking-widest">{editing ? 'Modifier' : 'Nouveau Produit'}</h3>
                                    <button onClick={() => setShowModal(false)}><Icon name="x" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-8 custom-scroll space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">Nom de l'Article</label><input value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold" /></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">Catégorie</label><input value={form.category} onChange={e => setForm({...form, category: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold" /></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">Unité de Base</label><input value={form.baseUnit} onChange={e => setForm({...form, baseUnit: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold" /></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">Stock Actuel</label><input type="number" value={form.stock} onChange={e => setForm({...form, stock: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold" /></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">Seuil d'Alerte</label><input type="number" value={form.minStock} onChange={e => setForm({...form, minStock: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-orange-600" /></div>
                                        <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase">Prix Achat</label><input type="number" value={form.purchasePrice} onChange={e => setForm({...form, purchasePrice: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-red-500" /></div>

                            </div>

                    {tab==='po' && <div className="bg-white rounded-3xl border overflow-hidden">

                            <tbody>{purchases.length===0 && <tr><td colSpan="5" className="p-10 text-center text-slate-400 italic">Aucun bon de réception</td></tr>}

                        </table>
                    </div>}
                    {showForm && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[200]">
                            <div className="bg-white rounded-3xl p-6 max-w-md w-full space-y-3">
                                <h3 className="font-black uppercase">Nouveau fournisseur</h3>
                                <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nom / Société" className="w-full p-3 bg-slate-50 border rounded-xl font-bold"/>
                                <input value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})} placeholder="Personne contact" className="w-full p-3 bg-slate-50 border rounded-xl font-bold"/>
                                <input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="Téléphone" className="w-full p-3 bg-slate-50 border rounded-xl font-bold"/>

                                <div className="flex gap-2"><button onClick={()=>setShowForm(false)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black uppercase text-xs">Annuler</button><button onClick={save} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black uppercase text-xs">Enregistrer</button></div>
                            </div>
                        </div>
                    )}
                    {poForm && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[200]">
                            <div className="bg-white rounded-3xl p-6 max-w-2xl w-full space-y-3 max-h-[90vh] overflow-y-auto">
                                <h3 className="font-black uppercase">Réception : {poForm.supplierName}</h3>
                                {poForm.items.map((l, i) => (
                                    <div key={i} className="grid grid-cols-12 gap-2 items-end bg-slate-50 p-2 rounded-xl">
                                        <select value={l.pid} onChange={e=>updLine(i,'pid',e.target.value)} className="col-span-6 p-2 bg-white border rounded-lg text-xs font-bold"><option value="">— Produit —</option>{products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
                                        <input type="number" placeholder="Qté" value={l.qty} onChange={e=>updLine(i,'qty',e.target.value)} className="col-span-2 p-2 bg-white border rounded-lg text-xs font-bold"/>
                                        <input type="number" placeholder="Coût unit." value={l.unitCost} onChange={e=>updLine(i,'unitCost',e.target.value)} className="col-span-3 p-2 bg-white border rounded-lg text-xs font-bold"/>
                                        <button onClick={()=>setPoForm(p=>({...p,items:p.items.filter((_,idx)=>idx!==i)}))} className="col-span-1 p-2 text-red-400"><Icon name="x" size={14}/></button>

                                ))}
                                <button onClick={addLine} className="w-full py-2 bg-slate-100 rounded-xl font-black uppercase text-[10px]">+ Ajouter ligne</button>

        function AuditView({ audit }) {

            const list = audit.filter(a => !filter || a.action.includes(filter.toUpperCase()) || (a.userName||'').toLowerCase().includes(filter.toLowerCase()));
            const colorOf = (act) => act.includes('SUPPR')?'text-red-600':act.includes('VENTE')?'text-blue-600':act.includes('REAPPRO')?'text-emerald-600':act.includes('LOGIN')||act.includes('LOGOUT')?'text-slate-500':'text-amber-600';

            return (
                <div className="space-y-4">

                        <div><h2 className="text-2xl font-black uppercase tracking-tighter">Journal d'Audit</h2><p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-1">{audit.length} événement(s)</p></div>
                        <input placeholder="Filtrer..." value={filter} onChange={e=>setFilter(e.target.value)} className="px-4 py-2 bg-slate-800 border border-slate-700 rounded-xl text-sm font-bold text-white placeholder:text-slate-500"/>
