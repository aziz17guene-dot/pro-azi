                        </table>
                    </div>
                </div>
            );
        }

        // ================================================================
        // HISTORIQUE
        // ================================================================
        function History({ sales, setSales, setProducts, onPrint, readOnly }) {
            const [page, setPage] = useState(0);
            const pageSize = 50;

            const sortedSales = useMemo(() => {
                return [...sales]
                    .filter(s => s.status !== 'deleted')
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [sales]);

            const visibleSales = useMemo(() => {
                return sortedSales.slice(0, (page + 1) * pageSize);
            }, [sortedSales, page]);

            const hasMore = sortedSales.length > visibleSales.length;

            const cancel = (id) => {
                const s = sales.find(x => x.id === id);
                if (!s || !confirm("Inverser cette vente ?")) return;
                setProducts(v => v.map(p => {
                    const item = s.items.find(it => it.pid === p.id);
                    return item ? { ...p, stock: Number((p.stock + item.qtyBase).toFixed(3)) } : p;
                }));
                setSales(v => v.map(x => x.id === id ? { ...x, status: 'canceled' } : x));
                showToast("Vente annulée", "warning");
            };

            const deleteSale = (sale) => {
                const dialog = document.createElement('div');
                dialog.style.cssText = `position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:24px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2);z-index:9999;max-width:320px;text-align:center;font-family:Inter,Arial;`;
                dialog.innerHTML = `
                    <h3 style="margin:0 0 8px;font-size:18px;font-weight:900;color:#0f172a;">Supprimer cette vente?</h3>
                    <p style="margin:0 0 20px;font-size:14px;color:#64748b;">Vente #${sale.num} - ${sale.total}F</p>
                    <div style="display:flex;gap:10px;margin-top:20px;">
                        <button id="keepBenefit" style="flex:1;padding:12px;background:#10b981;color:white;border:none;border-radius:12px;font-weight:900;cursor:pointer;font-size:12px;">✅ GARDER BÉNÉFICE</button>
                        <button id="removeBenefit" style="flex:1;padding:12px;background:#ef4444;color:white;border:none;border-radius:12px;font-weight:900;cursor:pointer;font-size:12px;">❌ ENLEVER BÉNÉFICE</button>
                    </div>
                `;
                document.body.appendChild(dialog);
                document.getElementById('keepBenefit').onclick = () => {
                    document.body.removeChild(dialog);
                    try {
                        const archiveKey = KEYS.ARCHIVED_BENEFITS;
                        const existing = JSON.parse(localStorage.getItem(archiveKey) || '[]');
                        const archivedBenefit = { id: Date.now(), benefit: sale.profit || 0, saleNum: sale.num, date: sale.date, archivedAt: new Date().toISOString() };
                        localStorage.setItem(archiveKey, JSON.stringify([archivedBenefit, ...existing]));
                    } catch (e) {}
                    setSales(prev => prev.map(x => x.id === sale.id ? { ...x, status: 'deleted', deletedAt: new Date().toISOString() } : x));
                    showToast("Vente supprimée, bénéfice gardé", "success");
                };
                document.getElementById('removeBenefit').onclick = () => {
                    document.body.removeChild(dialog);
                    setSales(prev => prev.map(x => x.id === sale.id ? { ...x, status: 'deleted', deletedAt: new Date().toISOString() } : x));
                    showToast("Vente supprimée, bénéfice enlevé", "success");
                };
            };

            return (
                <div className="space-y-4">
                    <h2 className="text-2xl font-black uppercase text-slate-800">{readOnly ? "Mes Ventes" : "Historique Journalier"}</h2>
                    {visibleSales.length === 0 && <div className="py-20 text-center text-slate-300 italic bg-white rounded-[32px] border">Aucune vente.</div>}
                    {visibleSales.map(s => (
                        <div key={s.id} className={`p-6 bg-white rounded-[32px] border ${s.status==='canceled'?'opacity-50 line-through':''} flex justify-between items-center shadow-sm hover:border-blue-100 transition-all`}>
                            <div>
                                <p className="text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-1">REÇU #{s.num}{s.sellerName && !readOnly ? ` • ${s.sellerName}` : ''}</p>
                                <p className="text-xl font-black text-slate-800 tracking-tighter">{s.total} F</p>
                                <p className="text-[10px] font-bold text-slate-400 flex gap-2 capitalize">{new Date(s.date).toLocaleString()} &bull; {s.payMethod}</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => onPrint(s)} className="p-3 bg-blue-50 text-blue-600 rounded-xl"><Icon name="printer" size={18}/></button>
                                {!readOnly && s.status==='active' && <button onClick={() => cancel(s.id)} className="p-3 bg-orange-50 text-orange-600 rounded-xl"><Icon name="alert-triangle" size={18}/></button>}
                                {!readOnly && <button onClick={() => deleteSale(s)} className="p-3 bg-red-50 text-red-500 rounded-xl"><Icon name="trash-2" size={18}/></button>}
                            </div>
                        </div>
                    ))}
                    {hasMore && (
                        <button onClick={() => setPage(p => p + 1)} className="w-full py-3 bg-slate-100 rounded-xl font-black uppercase text-xs hover:bg-slate-200 transition-colors">
                            Charger plus ({sortedSales.length - visibleSales.length} restants)
                        </button>
                    )}
                </div>
            );
        }

        // ================================================================
        // DÉPENSES
        // ================================================================
        function Expenses({ list, set, shopId }) {
            const [f, setF] = useState({ l: '', a: '' });

            const add = () => {
                if (!f.l || !f.a) return showToast("Remplissez tous les champs", "error");
                set([{ id: Date.now(), label: f.l, amount: Number(f.a), date: new Date() }, ...list]);
                setF({ l: '', a: '' });
                showToast("Dépense enregistrée", "success");
            };

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-black uppercase text-slate-800 tracking-tighter">Dépenses & Charges</h2>
                    <div className="bg-white p-8 rounded-[40px] shadow-sm border space-y-4 max-w-lg">
                        <input placeholder="Libellé de la dépense..." value={f.l} onChange={e => setF({...f, l: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" />
                        <input type="number" placeholder="Montant (F)..." value={f.a} onChange={e => setF({...f, a: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-black text-red-600" />
                        <button onClick={add} className="w-full py-5 bg-slate-900 text-white rounded-3xl font-black uppercase tracking-widest text-xs">Enregistrer</button>
                    </div>
                    <div className="bg-white rounded-3xl overflow-hidden border">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b"><tr><th className="p-5">Type</th><th>Date</th><th className="text-right p-5">Montant</th></tr></thead>
                            <tbody>{list.map(e => <tr key={e.id} className="border-b font-bold"><td className="p-5">{e.label}</td><td className="text-xs text-slate-300">{new Date(e.date).toLocaleDateString()}</td><td className="text-right p-5 text-red-500">-{e.amount} F</td></tr>)}</tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ================================================================
        // DETTES
        // ================================================================
        function Debt({ sales, setSales }) {
            const [debtPayments, setDebtPayments] = useState(() => JSON.parse(localStorage.getItem('ma_debt_payments_v3') || '{}'));
            const [selectedDebt, setSelectedDebt] = useState(null);
            const [partialAmount, setPartialAmount] = useState('');
            const deb = sales.filter(s => s.payMethod === 'credit' && s.status === 'active');

            const markPaid = (id) => {
                if (!confirm("Confirmer le paiement intégral de cette dette ?")) return;
                setSales(v => v.map(x => x.id === id ? { ...x, payMethod: 'cash', paidAt: new Date().toISOString() } : x));
                setDebtPayments(prev => { delete prev[id]; return prev; });
                localStorage.setItem('ma_debt_payments_v3', JSON.stringify(debtPayments));
                showToast("Dette payée", "success");
            };

            const addPartialPayment = (debtId, amount) => {
                const amt = Number(amount);
                if (amt <= 0) return showToast("Montant invalide", "error");
                const debt = deb.find(d => d.id === debtId);
                if (!debt) return;
                const paid = debtPayments[debtId] || 0;
                if (paid + amt > debt.total) return showToast("Le montant dépasse le total", "error");
                const newPayments = { ...debtPayments, [debtId]: paid + amt };
                setDebtPayments(newPayments);
                localStorage.setItem('ma_debt_payments_v3', JSON.stringify(newPayments));
                setPartialAmount('');
                showToast("Paiement partiel enregistré", "success");
                if (paid + amt >= debt.total) {
                    if (confirm("Tranches complètes! Marquer comme payée?")) markPaid(debtId);
                }
            };

            return (
                <div className="space-y-6">
                    <div className="bg-orange-600 p-10 rounded-[50px] text-white shadow-2xl flex justify-between items-center text-center"><div><h4 className="font-bold text-xl mb-1 uppercase tracking-tighter">Total à Recouvrer</h4><p className="text-5xl font-black">{deb.reduce((s,x)=>s+x.total, 0).toLocaleString()} F</p></div></div>
                    <div className="bg-white rounded-3xl overflow-hidden border">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b"><tr><th className="p-5">Client</th><th>Date</th><th className="text-right p-5">Montant</th><th className="text-right p-5">Action</th></tr></thead>
                            <tbody>{deb.length === 0 ? (
                                <tr><td colSpan="4" className="p-10 text-center text-slate-400 font-bold text-sm">Aucune dette en cours 🎉</td></tr>
                            ) : deb.map(s => {
                                const paidAmount = debtPayments[s.id] || 0;
                                const remaining = s.total - paidAmount;
                                return (
                                <React.Fragment key={s.id}>
                                    <tr className="border-b font-bold">
                                        <td className="p-5 text-orange-600 uppercase italic">{(s.customer || 'Client Inconnu').substring(0,25)}</td>
                                        <td className="text-xs text-slate-300">{new Date(s.date).toLocaleDateString()}</td>
                                        <td className="text-right p-5 font-black">{s.total} F {paidAmount > 0 && <span className="text-xs text-emerald-600">(-{paidAmount}F)</span>}</td>
                                        <td className="p-3 text-right">
                                            <div className="flex gap-2 justify-end">
                                                {selectedDebt === s.id ? (
                                                    <div className="flex gap-1">
                                                        <input type="number" value={partialAmount} onChange={e=>setPartialAmount(e.target.value)} placeholder="Montant" className="w-24 px-2 py-1 text-xs rounded border border-slate-300 bg-white" />
                                                        <button onClick={() => addPartialPayment(s.id, partialAmount)} className="px-2 py-1 bg-blue-600 text-white text-[10px] font-black rounded"><Icon name="plus" size={12}/></button>
                                                        <button onClick={() => setSelectedDebt(null)} className="px-2 py-1 bg-slate-400 text-white text-[10px] rounded"><Icon name="x" size={12}/></button>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <button onClick={() => setSelectedDebt(s.id)} className="px-2 py-1 bg-blue-600 text-white rounded-lg text-[10px] font-black uppercase shadow"><Icon name="split" size={12}/>Tranche</button>
                                                        <button onClick={() => markPaid(s.id)} className="px-3 py-2 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase shadow hover:bg-emerald-700 flex items-center gap-1"><Icon name="check" size={12}/>Payée</button>
                                                    </>
                                                )}
                                            </div>
                                        </td>
                                    </tr>
                                    {paidAmount > 0 && (
                                        <tr className="bg-blue-50 border-b text-xs text-slate-600">
                                            <td colSpan="4" className="p-3 italic text-center">Paiement(s) : {paidAmount}F / Reste : {remaining}F</td>
                                        </tr>
                                    )}
                                </React.Fragment>
                            )})}</tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ================================================================
        // RAPPORTS
        // ================================================================
        function Reports({ sales, expenses, products, logs, users = [] }) {
            const [period, setPeriod] = useState('week');
            const [sellerFilter, setSellerFilter] = useState('all');
            const filteredBySeller = sellerFilter === 'all' ? sales : sales.filter(s => s.sellerId === sellerFilter);
            const sellerStats = users.map(u => {
                const us = sales.filter(s => s.sellerId === u.id && s.status === 'active');
                return { user: u, count: us.length, total: us.reduce((s,x)=>s+x.total,0), profit: us.reduce((s,x)=>s+(x.profit||0),0) };
            });

            const filterData = (data, p) => {
                const now = new Date();
                return data.filter(item => {
                    const itemDate = new Date(item.date);
                    if (p === 'day') {
                        return itemDate.getDate() === now.getDate() && itemDate.getMonth() === now.getMonth() && itemDate.getFullYear() === now.getFullYear();
                    }
                    if (p === 'week') {
                        const startOfWeek = new Date(now);
                        startOfWeek.setDate(now.getDate() - now.getDay());
                        startOfWeek.setHours(0,0,0,0);
                        return itemDate >= startOfWeek;
                    }
                    if (p === 'month') {
                        return itemDate.getMonth() === now.getMonth() && itemDate.getFullYear() === now.getFullYear();
                    }
                    if (p === 'semester') {
                        const sem = Math.floor(now.getMonth() / 6);
                        const itemSem = Math.floor(itemDate.getMonth() / 6);
                        return itemSem === sem && itemDate.getFullYear() === now.getFullYear();
                    }
                    if (p === 'year') {
                        return itemDate.getFullYear() === now.getFullYear();
                    }
                    return true;
                });
            };

            const periodSales = filterData(filteredBySeller.filter(s => s.status === 'active'), period);
            const periodExpenses = filterData(expenses, period);
            const totalRev = periodSales.reduce((s, x) => s + x.total, 0);
            const totalProfit = periodSales.reduce((s, x) => s + x.profit, 0);
            const totalExp = periodExpenses.reduce((s, x) => s + x.amount, 0);
            const netResult = totalProfit - totalExp;

            const productStats = {};
            periodSales.forEach(s => {
                s.items.forEach(it => {
                    if (!productStats[it.pid]) productStats[it.pid] = { name: it.pname, qty: 0, total: 0, profit: 0, cost: 0 };
                    productStats[it.pid].qty += it.q;
                    productStats[it.pid].total += (it.lineNet != null ? it.lineNet : it.total);
                    productStats[it.pid].cost += (it.lineCost != null ? it.lineCost : 0);
                    productStats[it.pid].profit += (it.lineProfit != null ? it.lineProfit : 0);
                });
            });
            const topProducts = Object.values(productStats).sort((a,b) => b.profit - a.profit).slice(0, 5);

            return (
                <div className="space-y-6 pb-20">
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Bilans & Inventaire</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Suivi de performance périodique</p>
                        </div>
                        <div className="flex flex-wrap gap-2 bg-white p-1 rounded-2xl border shadow-sm self-stretch md:self-auto">
                            <button onClick={() => setPeriod('day')} className={`flex-1 md:flex-none px-4 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${period==='day'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:bg-slate-50'}`}>Jour</button>
                            <button onClick={() => setPeriod('week')} className={`flex-1 md:flex-none px-4 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${period==='week'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:bg-slate-50'}`}>Semaine</button>
                            <button onClick={() => setPeriod('month')} className={`flex-1 md:flex-none px-4 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${period==='month'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:bg-slate-50'}`}>Mois</button>
                            <button onClick={() => setPeriod('semester')} className={`flex-1 md:flex-none px-4 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${period==='semester'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:bg-slate-50'}`}>Semestre</button>
                            <button onClick={() => setPeriod('year')} className={`flex-1 md:flex-none px-4 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${period==='year'?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:bg-slate-50'}`}>Année</button>
                        </div>
                    </header>

                    {users.length > 0 && (
                        <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex flex-wrap items-center gap-3">
                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Filtrer par employé :</span>
                            <button onClick={()=>setSellerFilter('all')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase ${sellerFilter==='all'?'bg-slate-900 text-white':'bg-slate-100 text-slate-600'}`}>Tous</button>
                            {users.map(u => (
                                <button key={u.id} onClick={()=>setSellerFilter(u.id)} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase ${sellerFilter===u.id?'bg-blue-600 text-white':'bg-slate-100 text-slate-600'}`}>{u.name}</button>
                            ))}
                        </div>
                    )}

                    {users.length > 1 && sellerFilter === 'all' && (
                        <div className="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
                            <h3 className="text-xs font-black uppercase tracking-widest text-slate-800 mb-4">Performance par Employé (Total)</h3>
                            <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-3">
                                {sellerStats.sort((a,b)=>b.total-a.total).map(st => (
                                    <div key={st.user.id} className="p-4 bg-slate-50 rounded-2xl border">
                                        <div className="flex items-center gap-2 mb-2">
                                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-white ${st.user.role==='admin'?'bg-emerald-600':'bg-amber-600'}`}><Icon name={st.user.role==='admin'?'shield':'user'} size={14}/></div>
                                            <p className="font-black text-slate-800 text-sm truncate">{st.user.name}</p>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2 text-center">
                                            <div><p className="text-[9px] font-bold text-slate-400 uppercase">Ventes</p><p className="font-black text-slate-800">{st.count}</p></div>
                                            <div><p className="text-[9px] font-bold text-slate-400 uppercase">CA</p><p className="font-black text-blue-600 text-xs">{st.total.toLocaleString()} F</p></div>
                                            <div><p className="text-[9px] font-bold text-slate-400 uppercase">Marge</p><p className="font-black text-emerald-600 text-xs">{st.profit.toLocaleString()} F</p></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Chiffre d'Affaires</p><p className="text-2xl font-black text-slate-800">{totalRev.toLocaleString()} F</p></div>
                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-l-blue-500"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Marge Brute</p><p className="text-2xl font-black text-blue-600">{totalProfit.toLocaleString()} F</p></div>
                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-l-red-500"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Total Dépenses</p><p className="text-2xl font-black text-red-500">{totalExp.toLocaleString()} F</p></div>
                        <div className={`bg-white p-6 rounded-3xl border border-slate-100 shadow-sm border-l-4 ${netResult >= 0 ? 'border-l-green-500' : 'border-l-orange-500'}`}><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Bénéfice Net</p><p className={`text-2xl font-black ${netResult >= 0 ? 'text-green-600' : 'text-orange-600'}`}>{netResult.toLocaleString()} F</p></div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-[40px] border border-slate-100 shadow-sm p-8">
                            <h3 className="text-sm font-black uppercase tracking-widest text-slate-800 mb-6 flex items-center gap-2"><Icon name="trophy" className="text-yellow-500" /> Bénéfices par Produit</h3>
                            <div className="space-y-3">
                                {topProducts.map((p, i) => {
                                    const margin = p.total > 0 ? Math.round((p.profit / p.total) * 100) : 0;
                                    return (
                                        <div key={i} className="bg-slate-50 p-4 rounded-2xl">
                                            <div className="flex justify-between items-start gap-3 mb-2">
                                                <div className="flex items-center gap-3 min-w-0">
                                                    <span className="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-xs font-black text-slate-500 shrink-0">{i+1}</span>
                                                    <div className="min-w-0">
                                                        <p className="font-bold text-xs truncate">{p.name}</p>
                                                        <p className="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">{p.qty.toFixed(2)} vendus</p>
                                                    </div>
                                                </div>
                                                <span className="px-2 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-black rounded-full whitespace-nowrap">{margin}% marge</span>
                                            </div>
                                            <div className="grid grid-cols-3 gap-2 text-center pt-2 border-t border-slate-200/70">
                                                <div><p className="text-[9px] font-bold text-slate-400 uppercase">CA</p><p className="font-black text-blue-600 text-xs">{Math.round(p.total).toLocaleString()} F</p></div>
                                                <div><p className="text-[9px] font-bold text-slate-400 uppercase">Coût</p><p className="font-black text-slate-700 text-xs">{Math.round(p.cost).toLocaleString()} F</p></div>
                                                <div><p className="text-[9px] font-bold text-slate-400 uppercase">Bénéfice</p><p className="font-black text-emerald-600 text-xs">{Math.round(p.profit).toLocaleString()} F</p></div>
                                            </div>
                                        </div>
                                    );
                                })}
                                {!topProducts.length && <p className="text-center py-10 text-slate-300 italic">Aucune donnée pour cette période.</p>}
                            </div>
                        </div>

                        <div className="bg-white rounded-[40px] border border-slate-100 shadow-sm p-8">
                            <h3 className="text-sm font-black uppercase tracking-widest text-slate-800 mb-6 flex items-center gap-2"><Icon name="alert-triangle" className="text-orange-500" /> État des Stocks Critiques</h3>
                            <div className="space-y-3">
                                {products.filter(p => p.stock <= p.minStock).slice(0, 8).map(p => (
                                    <div key={p.id} className="flex justify-between items-center p-3 border-b border-slate-50 border-dashed">
                                        <div className="flex items-center gap-3"><div className="w-2 h-2 bg-orange-500 rounded-full animate-pulse"></div><span className="text-xs font-bold">{p.name}</span></div>
                                        <div className="text-right"><span className="px-3 py-1 bg-orange-50 text-orange-600 rounded-full text-[10px] font-black">{p.stock} / {p.minStock} {p.baseUnit}</span></div>
                                    </div>
                                ))}
                                {products.filter(p => p.stock <= p.minStock).length === 0 && (
                                    <div className="flex flex-col items-center justify-center py-10 text-slate-300">
                                        <Icon name="check-circle" size={40} className="mb-2 text-green-400" />
                                        <p className="italic">Tous les stocks sont à jour.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ================================================================
        // ACTIVITÉS
        // ================================================================
        function ActivityLogs({ activities, logs, onPrint, showSeller }) {
            const totalProfitEver = logs.reduce((s, x) => s + x.profit, 0);

            return (
                <div className="space-y-6">
                    <header className="flex justify-between items-center bg-slate-900 p-8 rounded-[40px] text-white overflow-hidden relative shadow-xl">
                        <div className="relative z-10"><h2 className="text-2xl font-black uppercase tracking-tighter">Journal d'Activité</h2><p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-1">Historique de sécurité & Reçus sauvegardés</p></div>
                        <div className="text-right relative z-10"><p className="text-[10px] font-black text-slate-400 uppercase mb-1">Bénéfice Cumulé (Sauvegardé)</p><p className="text-3xl font-black text-white">{totalProfitEver.toLocaleString()} F</p></div>
                        <div className="absolute -right-4 -bottom-4 opacity-10"><Icon name="list-checks" size={140} /></div>
                    </header>

                    <div className="bg-white rounded-[40px] border border-slate-100 shadow-sm overflow-hidden">
                        <div className="p-6 border-b bg-slate-50 flex items-center gap-4"><Icon name="history" className="text-slate-400" /><h3 className="text-xs font-black uppercase tracking-widest text-slate-800">Journal Illimité des Reçus Authentifiés</h3></div>
                        <div className="divide-y divide-slate-100 max-h-[600px] overflow-y-auto custom-scroll">
                            {activities.map((a, i) => (
                                <div key={i} className="p-4 hover:bg-slate-50 transition-all flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold text-xs">#{a.num}</div>
                                        <div><p className="text-sm font-black text-slate-800 tracking-tight">{a.total.toLocaleString()} F</p><p className="text-[9px] font-bold text-slate-400 uppercase">{new Date(a.date).toLocaleString()} &bull; {a.customer || 'Anonyme'}{showSeller && a.sellerName ? ` • 👤 ${a.sellerName}` : ''}</p></div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => onPrint(a)} className="p-3 text-blue-600 hover:bg-blue-50 rounded-xl transition-colors"><Icon name="printer" size={18}/></button>
                                        <span className={`px-3 py-1 rounded-full text-[8px] font-black uppercase ${a.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>{a.status === 'active' ? 'Validé' : 'Annulé'}</span>
                                    </div>
                                </div>
                            ))}
                            {!activities.length && <div className="py-20 text-center text-slate-300 italic">Aucune activité enregistrée.</div>}
                        </div>
                    </div>
                </div>
            );
        }

        // ================================================================
        // EMPLOYÉS
        // ================================================================
        function Employees({ users, setUsers, sales, currentUser }) {
            const [showForm, setShowForm] = useState(false);
            const [editing, setEditing] = useState(null);
            const [form, setForm] = useState({ name: '', username: '', pwd: '', role: 'employee', permissions: DEFAULT_EMP_PERMS });

            const open = (u) => {
                if (u) { setEditing(u); setForm({ name: u.name, username: u.username, pwd: '', role: u.role, permissions: u.permissions || DEFAULT_EMP_PERMS }); }
                else { setEditing(null); setForm({ name: '', username: '', pwd: '', role: 'employee', permissions: DEFAULT_EMP_PERMS }); }
                setShowForm(true);
            };

            const togglePerm = (p) => setForm(f => ({ ...f, permissions: f.permissions.includes(p) ? f.permissions.filter(x=>x!==p) : [...f.permissions, p] }));

            const save = () => {
                if (!form.name.trim() || !form.username.trim()) return showToast("Nom et identifiant requis.", "error");
                const uname = form.username.trim().toLowerCase();
                if (users.some(u => u.username === uname && u.id !== editing?.id)) return showToast("Cet identifiant existe déjà.", "error");
                const perms = form.role === 'admin' ? ALL_PERMS : form.permissions;
                if (editing) {
                    setUsers(users.map(u => u.id === editing.id ? { ...u, name: form.name.trim(), username: uname, role: form.role, permissions: perms, ...(form.pwd ? { passwordHash: hashPwd(form.pwd) } : {}) } : u));
                    showToast("Employé modifié", "success");
                } else {
                    if (!form.pwd || form.pwd.length < 4) return showToast("Mot de passe : 4 caractères minimum.", "error");
                    const nu = { id: 'U-' + Date.now(), name: form.name.trim(), username: uname, passwordHash: hashPwd(form.pwd), role: form.role, permissions: perms, active: true, createdAt: new Date().toISOString() };
                    setUsers([...users, nu]);
                    showToast(`Compte ${form.role === 'admin' ? 'administrateur' : 'caissier'} créé`, "success");
                }
                setShowForm(false);
            };

            const toggleActive = (u) => setUsers(users.map(x => x.id === u.id ? { ...x, active: x.active === false ? true : false } : x));
            const remove = (u) => {
                if (u.id === currentUser.id) return showToast("Vous ne pouvez pas supprimer votre propre compte.", "error");
                if (u.role === 'admin' && users.filter(x => x.role === 'admin').length <= 1) return showToast("Il doit rester au moins un administrateur.", "error");
                if (!confirm(`Supprimer ${u.name} ?`)) return;
                setUsers(users.filter(x => x.id !== u.id));
                showToast("Employé supprimé", "success");
            };

            const statsFor = (u) => {
                const us = sales.filter(s => s.sellerId === u.id && s.status === 'active');
                return { count: us.length, total: us.reduce((s,x)=>s+x.total,0) };
            };

            return (
                <div className="space-y-6">
                    <header className="flex justify-between items-center bg-slate-900 p-8 rounded-[40px] text-white shadow-xl">
                        <div><h2 className="text-2xl font-black uppercase tracking-tighter">Gestion des Employés</h2><p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-1">{users.length} compte(s)</p></div>
                        <button onClick={() => open(null)} className="px-6 py-4 bg-blue-600 rounded-2xl font-black uppercase text-xs shadow-lg flex items-center gap-2 active:scale-95"><Icon name="user-plus" size={16}/> Nouveau</button>
                    </header>
                    <div className="grid gap-4 md:grid-cols-2">
                        {users.map(u => {
                            const st = statsFor(u);
                            return (
                                <div key={u.id} className={`p-6 bg-white rounded-[32px] border ${u.active === false ? 'opacity-60' : ''} shadow-sm`}>
                                    <div className="flex items-start gap-4">
                                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-white ${u.role === 'admin' ? 'bg-emerald-600' : 'bg-amber-600'}`}><Icon name={u.role === 'admin' ? 'shield' : 'user'} size={24} /></div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex items-center gap-2 flex-wrap">
                                                <h3 className="font-black text-slate-800 text-lg tracking-tight">{u.name}</h3>
                                                <span className={`px-2 py-0.5 rounded-full text-[8px] font-black uppercase ${u.role === 'admin' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>{u.role === 'admin' ? 'Admin' : 'Caissier'}</span>
                                                {u.active === false && <span className="px-2 py-0.5 rounded-full text-[8px] font-black uppercase bg-red-100 text-red-700">Désactivé</span>}
                                            </div>
                                            <p className="text-xs text-slate-400 font-bold mt-1">@{u.username}</p>
                                            <div className="mt-3 flex gap-4 text-[11px] font-bold text-slate-500">
                                                <span><span className="text-slate-800 font-black">{st.count}</span> ventes</span>
                                                <span><span className="text-slate-800 font-black">{st.total.toLocaleString()} F</span> encaissés</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-2 mt-4">
                                        <button onClick={() => open(u)} className="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl text-xs font-black uppercase">Modifier</button>
                                        <button onClick={() => toggleActive(u)} disabled={u.id === currentUser.id} className="flex-1 py-2.5 bg-amber-50 text-amber-700 rounded-xl text-xs font-black uppercase disabled:opacity-40">{u.active === false ? 'Activer' : 'Désactiver'}</button>
                                        <button onClick={() => remove(u)} className="px-4 py-2.5 bg-red-50 text-red-600 rounded-xl"><Icon name="trash-2" size={16}/></button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    {showForm && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[200]">
                            <div className="bg-white rounded-[32px] p-8 max-w-md w-full space-y-4 shadow-2xl">
                                <h3 className="text-xl font-black uppercase tracking-tighter">{editing ? 'Modifier' : 'Nouvel'} Employé</h3>
                                <input value={form.name} onChange={e=>setForm({...form, name: e.target.value})} placeholder="Nom complet" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" />
                                <input value={form.username} onChange={e=>setForm({...form, username: e.target.value})} placeholder="Identifiant" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" />
                                <input type="password" value={form.pwd} onChange={e=>setForm({...form, pwd: e.target.value})} placeholder={editing ? "Nouveau mot de passe (laisser vide pour conserver)" : "Mot de passe"} className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" />
                                <div className="flex gap-2 p-1 bg-slate-100 rounded-2xl">
                                    <button onClick={() => setForm({...form, role: 'employee'})} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase ${form.role==='employee'?'bg-amber-600 text-white shadow':'text-slate-500'}`}>Caissier</button>
                                    <button onClick={() => setForm({...form, role: 'admin'})} className={`flex-1 py-3 rounded-xl text-[10px] font-black uppercase ${form.role==='admin'?'bg-emerald-600 text-white shadow':'text-slate-500'}`}>Admin</button>
                                </div>
                                {form.role === 'employee' && (
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-black uppercase text-slate-500 tracking-widest">Permissions</p>
                                        <div className="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto p-2 bg-slate-50 rounded-xl">
                                            {ALL_PERMS.map(p => (
                                                <label key={p} className="flex items-center gap-2 text-[10px] font-bold cursor-pointer">
                                                    <input type="checkbox" checked={form.permissions.includes(p)} onChange={()=>togglePerm(p)} />
                                                    <span className="capitalize">{p.replace('_',' ')}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                <div className="flex gap-2 pt-2">
                                    <button onClick={() => setShowForm(false)} className="flex-1 py-4 bg-slate-100 text-slate-700 rounded-2xl font-black uppercase text-xs">Annuler</button>
                                    <button onClick={save} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs">Enregistrer</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ================================================================
        // SETTINGS
        // ================================================================
        function Settings({ storage, products, sales, expenses, shop, setShop, shops = [], setShops, logs, activities, suppliers = [], purchases = [], customers = [], audit = [], logout, currentUser, onManualSync }) {
            const exportExcel = () => {
                if (!window.XLSX) return showToast("Module Excel en chargement", "warning");
                const wb = window.XLSX.utils.book_new();
                const sheets = {
                    Produits: products.map(p => ({ Nom: p.name, Catégorie: p.category, Stock: p.stock, Unité: p.baseUnit, PrixAchat: p.purchasePrice, PrixVente: p.salePrice, CodeBarres: p.barcode || '', Péremption: p.expiryDate || '' })),
                    Ventes: sales.map(s => ({ Num: s.num, Date: s.date, Client: s.customer || '', Caissier: s.sellerName || '', Mode: s.payMethod, Total: s.total, Profit: s.profit, Statut: s.status })),
                    Dépenses: expenses.map(e => ({ Date: e.date, Libellé: e.label, Montant: e.amount })),
                    Fournisseurs: suppliers, Clients: customers, Réceptions: purchases.map(p => ({ Date: p.date, Fournisseur: p.supplierName, Lignes: p.items.length, Total: p.total })), Audit: audit
                };
                Object.entries(sheets).forEach(([n, d]) => window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(d), n.slice(0,31)));
                window.XLSX.writeFile(wb, `MARKET_${new Date().toISOString().slice(0,10)}.xlsx`);
                showToast("Export Excel réussi", "success");
            };

            const exportPDF = () => {
                if (!window.jspdf) return showToast("Module PDF en chargement", "warning");
                const doc = new window.jspdf.jsPDF();
                doc.setFontSize(16); doc.text(`${shop.name} — Rapport`, 14, 18);
                doc.setFontSize(10); doc.text(`Édité le ${new Date().toLocaleString()}`, 14, 26);
                const totalCA = sales.filter(s=>s.status==='active').reduce((a,b)=>a+b.total,0);
                const totalProfit = sales.filter(s=>s.status==='active').reduce((a,b)=>a+(b.profit||0),0);
                const totalExp = expenses.reduce((a,b)=>a+b.amount,0);
                doc.text(`CA total : ${totalCA.toLocaleString()} F`, 14, 34);
                doc.text(`Marge : ${totalProfit.toLocaleString()} F   |   Dépenses : ${totalExp.toLocaleString()} F`, 14, 40);
                doc.autoTable({ startY: 46, head: [['Produit','Stock','Achat','Vente']], body: products.map(p=>[p.name, p.stock+' '+p.baseUnit, p.purchasePrice, p.salePrice]) });
                doc.autoTable({ head: [['Date','N°','Client','Caissier','Total']], body: sales.slice(0,50).map(s=>[new Date(s.date).toLocaleDateString(), s.num, s.customer||'-', s.sellerName||'-', s.total]) });
                doc.save(`RAPPORT_${new Date().toISOString().slice(0,10)}.pdf`);
                showToast("Export PDF réussi", "success");
            };

            const switchShop = (s) => { if (confirm(`Basculer vers la boutique ${s.name} ?`)) { storage.set(KEYS.SHOP, s); window.location.reload(); } };

            const addShop = () => {
                const name = prompt("Nom de la nouvelle boutique :");
                if (!name) return;
                const newShop = { id: 'SHOP-' + Date.now(), name, phone: shop.phone, address: shop.address };
                setShops([...(shops||[]), newShop]);
                showToast("Boutique ajoutée", "success");
            };

            const archiveOldSales = () => {
                const cutoff = new Date();
                cutoff.setMonth(cutoff.getMonth() - 6);
                const old = sales.filter(s => new Date(s.date) < cutoff && s.status !== 'deleted');
                if (old.length === 0) return showToast("Aucune vente à archiver", "info");
                if (!confirm(`Archiver ${old.length} ventes de plus de 6 mois ?`)) return;
                const archivedKey = KEYS.ARCHIVED_SALES;
                const existing = JSON.parse(localStorage.getItem(archivedKey) || '[]');
                localStorage.setItem(archivedKey, JSON.stringify([...existing, ...old]));
                setSales(sales.filter(s => new Date(s.date) >= cutoff || s.status === 'deleted'));
                showToast(`${old.length} ventes archivées`, "success");
            };

            return (
                <div className="max-w-2xl mx-auto py-12 space-y-6">
                    {currentUser && logout && (
                        <div className="bg-white p-6 rounded-[40px] shadow-sm border flex items-center justify-between gap-4">
                            <div className="min-w-0"><h3 className="text-sm font-black uppercase tracking-tighter">Compte connecté</h3><p className="text-xs font-bold text-slate-600 truncate">{currentUser.name} <span className="text-[10px] text-slate-400 uppercase ml-1">({currentUser.role})</span></p></div>
                            <button onClick={() => { if (confirm("Se déconnecter ?")) logout(); }} className="px-4 py-3 bg-red-600 text-white rounded-2xl font-black uppercase text-[11px] flex items-center gap-2 shrink-0"><Icon name="log-out" size={14}/> Déconnexion</button>
                        </div>
                    )}
                    <div className="bg-white p-8 rounded-[40px] shadow-sm border space-y-4">
                        <h3 className="text-xl font-black tracking-tighter uppercase">Identité Boutique</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <input value={shop.name} onChange={e => setShop({...shop, name: e.target.value})} className="p-4 bg-slate-50 border rounded-2xl font-bold" placeholder="Nom"/>
                            <input value={shop.phone} onChange={e => setShop({...shop, phone: e.target.value})} className="p-4 bg-slate-50 border rounded-2xl font-bold" placeholder="Téléphone"/>
                        </div>
                        <input value={shop.address} onChange={e => setShop({...shop, address: e.target.value})} className="w-full p-4 bg-slate-50 border rounded-2xl font-bold" placeholder="Adresse"/>
                        <div className="flex items-center gap-4 pt-2">
                            {shop.logo ? <img src={shop.logo} alt="Logo boutique" className="w-20 h-20 rounded-2xl object-cover border-2 border-slate-200" /> : <div className="w-20 h-20 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400"><Icon name="image" size={28}/></div>}
                            <div className="flex-1 space-y-2">
                                <label className="block">
                                    <span className="px-4 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase cursor-pointer inline-flex items-center gap-2"><Icon name="upload" size={14}/> {shop.logo ? 'Changer le logo' : 'Ajouter un logo'}</span>
                                    <input type="file" accept="image/*" className="hidden" onChange={e => {
                                        const f = e.target.files?.[0]; if (!f) return;
                                        if (f.size > 1024*1024) return showToast("Logo trop lourd (>1 Mo)", "error");
                                        const reader = new FileReader();
                                        reader.onload = ev => setShop({...shop, logo: ev.target.result});
                                        reader.readAsDataURL(f);
                                    }}/>
                                </label>
                                {shop.logo && <button onClick={()=>setShop({...shop, logo: null})} className="ml-2 text-[10px] font-black text-red-500 uppercase">Retirer</button>}
                                <p className="text-[10px] text-slate-400 italic">PNG/JPG, max 1 Mo. Affiché dans le menu et les reçus.</p>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-8 rounded-[40px] shadow-sm border space-y-4">
                        <div className="flex justify-between items-center"><h3 className="text-lg font-black uppercase tracking-tighter">Mes Boutiques ({(shops||[]).length || 1})</h3><button onClick={addShop} className="px-4 py-2 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase">+ Ajouter</button></div>
                        <div className="space-y-2">
                            {(shops && shops.length ? shops : [shop]).map(s => (
                                <div key={s.id} className={`p-4 rounded-2xl border flex justify-between items-center ${s.id===shop.id?'bg-emerald-50 border-emerald-300':'bg-slate-50'}`}>
                                    <div><p className="font-black text-sm">{s.name}</p><p className="text-[10px] text-slate-400 font-mono">{s.id}</p></div>
                                    {s.id===shop.id ? <span className="text-[10px] font-black uppercase text-emerald-700">Active</span> : <button onClick={()=>switchShop(s)} className="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-[10px] font-black uppercase">Basculer</button>}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white p-8 rounded-[40px] shadow-sm border space-y-4">
                        <h3 className="text-lg font-black uppercase tracking-tighter">Sauvegarde & Export</h3>
                        <div className="grid grid-cols-1 gap-3">
                            <button onClick={exportExcel} className="py-4 bg-emerald-600 text-white rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2"><Icon name="file-spreadsheet" size={16}/> Export Excel (toutes données)</button>
                            <button onClick={exportPDF} className="py-4 bg-red-600 text-white rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2"><Icon name="file-text" size={16}/> Rapport PDF</button>
                            <button onClick={() => {
                                const data = { p: products, s: sales, e: expenses, l: logs, a: activities, sup: suppliers, pur: purchases, c: customers, au: audit };
                                const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
                                const url = URL.createObjectURL(blob);
                                const link = document.createElement('a'); link.href = url; link.download = `SAVE_MARKET_${new Date().toISOString().slice(0,10)}.json`; link.click();
                                showToast("Sauvegarde JSON créée", "success");
                            }} className="py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2"><Icon name="save" size={16}/> Sauvegarde JSON complète</button>
                            <label className="py-4 bg-slate-100 text-slate-700 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2 cursor-pointer"><Icon name="upload" size={16}/> Restaurer JSON
                                <input type="file" accept=".json" className="hidden" onChange={e => {
                                    const f = e.target.files[0]; if (!f) return;
                                    const r = new FileReader();
                                    r.onload = (ev) => {
                                        try {
                                            const d = JSON.parse(ev.target.result);
                                            if (!confirm("Remplacer les données actuelles ?")) return;
                                            if (d.p) storage.set(KEYS.PRODUCTS, d.p);
                                            if (d.s) storage.set(KEYS.SALES, d.s);
                                            if (d.e) storage.set(KEYS.EXPENSES, d.e);
                                            if (d.sup) storage.set(KEYS.SUPPLIERS, d.sup);
                                            if (d.pur) storage.set(KEYS.PURCHASES, d.pur);
                                            if (d.c) storage.set(KEYS.CUSTOMERS, d.c);
                                            if (d.au) storage.set(KEYS.AUDIT, d.au);
                                            window.location.reload();
                                        } catch (err) { showToast("Fichier invalide", "error"); }
                                    };
                                    r.readAsText(f);
                                }}/>
                            </label>
                            <button onClick={archiveOldSales} className="py-4 bg-amber-600 text-white rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2"><Icon name="archive" size={16}/> Archiver les ventes de +6 mois</button>
                            <button onClick={() => { if(confirm("Vider toutes les données ?")) { localStorage.clear(); window.location.reload(); } }} className="py-3 text-red-500 font-bold text-xs">Réinitialiser l'Application (RAZ)</button>
                            <button onClick={onManualSync} className="py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2"><Icon name="refresh-cw" size={16}/> Synchroniser maintenant</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ================================================================
        // AUTHENTIFICATION
        // ================================================================
        function ShopSetup({ onComplete, storage }) {
            const knownShops = (() => { try { return JSON.parse(localStorage.getItem(KEYS.SHOPS) || '[]'); } catch { return []; } })();
            const urlParams = new URLSearchParams(window.location.search);
            const shopFromUrl = urlParams.get('shop') || window.location.hash.replace('#shop=', '');
            const lastShopId = shopFromUrl || localStorage.getItem('ma_last_shop_id') || (knownShops[0] && knownShops[0].id) || '';
            const [mode, setMode] = useState(knownShops.length ? 'join' : 'create');
            const [form, setForm] = useState({ name: '', phone: '', address: '' });
            const [joinId, setJoinId] = useState(lastShopId);
            const [unlocked, setUnlocked] = useState(() => localStorage.getItem('ma_owner_ok') === '1');
            const [code, setCode] = useState('');
            const [busy, setBusy] = useState(false);
            const OWNER_CODE = '53228052';

            const tryUnlock = () => {
                if (code.trim() === OWNER_CODE) {
                    localStorage.setItem('ma_owner_ok', '1');
                    setUnlocked(true);
                    showToast("Application débloquée", "success");
                } else {
                    showToast("Code d'activation incorrect", "error");
                }
            };

            const handleCreate = () => {
                if (!form.name || !form.phone) return showToast("Veuillez saisir le nom et le téléphone.", "error");
                const newShop = { ...form, id: 'SHOP-' + Math.random().toString(36).substring(2, 9).toUpperCase(), createdAt: new Date().toISOString() };
                localStorage.setItem('ma_last_shop_id', newShop.id);
                onComplete(newShop);
            };

            const handleJoin = async () => {
                const id = joinId.trim().toUpperCase();
                if (!id.startsWith('SHOP-')) return showToast("Code boutique invalide. Format attendu : SHOP-XXXXXXX", "error");
                setBusy(true);
                try {
                    let shops = JSON.parse(localStorage.getItem(KEYS.SHOPS) || '[]');
                    let sh = shops.find(s => s.id === id);
                    if (window.Cloud) {
                        try { await window.Cloud.pull(id, { applyToStorage: true }); } catch (_) {}
                    }
                    shops = JSON.parse(localStorage.getItem(KEYS.SHOPS) || '[]');
                    sh = shops.find(s => s.id === id);
                    if (sh) localStorage.setItem(KEYS.SHOP, JSON.stringify(sh));
                    if (!sh) sh = { id, name: id.slice(-4), phone: '', address: '', createdAt: new Date().toISOString() };
                    localStorage.setItem('ma_last_shop_id', id);
                    onComplete(sh);
                } catch (e) {
                    showToast("Impossible d'ouvrir la boutique : " + e.message, "error");
                } finally { setBusy(false); }
            };

            return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 text-white">
                    <div className="w-full max-w-md bg-slate-800 rounded-[40px] p-10 border border-slate-700 shadow-2xl">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-4 border-4 border-slate-700 shadow-xl">
                                <Icon name="store" size={40} />
                            </div>
                            <h2 className="text-3xl font-black tracking-tighter uppercase">Aziz-Pro</h2>
                            <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2">Configuration de la Boutique</p>
                            <p className="text-slate-500 text-[10px] font-bold mt-1">Tél: 67 41 09 46</p>
                        </div>

                        {!unlocked ? (
                            <div className="space-y-4">
                                <div className="p-4 bg-amber-900/30 border border-amber-700/40 rounded-2xl text-center">
                                    <p className="text-[11px] font-black uppercase text-amber-300 tracking-widest mb-1">Application protégée</p>
                                    <p className="text-[11px] text-amber-100/80 leading-relaxed">Saisissez le code d'activation fourni par <span className="font-black">Aziz-Pro</span> pour installer cette application.</p>
                                </div>
                                <input value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>e.key==='Enter'&&tryUnlock()} type="password" inputMode="numeric" autoFocus className="w-full p-5 bg-slate-900 border border-slate-700 rounded-2xl outline-none focus:border-blue-500 text-center text-2xl font-black tracking-[0.5em]" placeholder="••••••••" />
                                <button onClick={tryUnlock} className="w-full py-5 bg-blue-600 rounded-3xl font-black uppercase text-xs shadow-xl active:scale-95 transition-transform">
                                    Activer l'application
                                </button>

        const INITIAL_PRODUCTS = [
            { id: '1', name: 'Huile Dinor', category: 'Alimentaire', purchasePrice: 900, salePrice: 1100, stock: 50, baseUnit: 'Litre', minStock: 10, variants: [{ id: 'v1', label: '1 Litre', coefficient: 1, price: 1100 }, { id: 'v2', label: 'Demi-Litre', coefficient: 0.5, price: 600 }] },
