    class CloudFirstStorage {
        constructor() {
            this.supabaseUrl = 'https://cxtwljxfitgdvvwytwxx.supabase.co';
            this.supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4dHdsanhmaXRnZHZ2d3l0d3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzOTAxMjUsImV4cCI6MjA5Njk2NjEyNX0.G_CTWUtmJMY5d5nFkA03A38cGBLKbJyhd9LoRsWtM1c';

        initCloud() {
            try {
                if (window.supabase) {

        setupNetworking() {

                this.isOnline = true;
                console.log('🌐 En ligne - traitement de la file');

            });
            window.addEventListener('offline', () => {
                this.isOnline = false;
                console.log('📡 Hors ligne - mode dégradé');
            });
        }

        async save(key, data, userId = 'default') {
            // Sauvegarde locale immédiate
            this.saveLocal(key, data);

            // Si en ligne, sauvegarde cloud en arrière-plan
            if (this.isOnline && this.supabase) {
                try {
                    const record = {
                        user_id: userId,
                        data_key: key,
                        data: JSON.stringify(data),
                        synced_at: new Date().toISOString(),
                        checksum: this.hash(data)
                    };
                    await this.supabase.from('aziz_data').upsert(record, { onConflict: 'user_id,data_key' });
                    console.log('☁️ Sauvegardé cloud:', key);
                    return true;
                } catch (err) {
                    console.warn('⚠️ Cloud save échoué, mis en queue:', key);
                    this.retryQueue.push({ key, data, userId });
                }
            }
            return false;
        }

        async load(key, userId = 'default') {
            // D'abord vérifier le cloud
            if (this.isOnline && this.supabase) {
                try {
                    const { data, error } = await this.supabase
                        .from('aziz_data')
                        .select('data')
                        .eq('user_id', userId)
                        .eq('data_key', key)
                        .single();
                    if (data) {
                        const parsed = JSON.parse(data.data);
                        this.saveLocal(key, parsed); // cache local
                        return parsed;
                    }
                } catch (err) {
                    console.log('ℹ️ Cloud load échoué, fallback local:', key);
                }
            }
            // Fallback local
            return this.loadLocal(key);
        }

        saveLocal(key, data) {
            try {
                localStorage.setItem(`aziz_${key}`, JSON.stringify(data));
            } catch (e) {
                console.warn('⚠️ Local save échoué:', key);
            }
        }

        loadLocal(key) {
            try {
                const data = localStorage.getItem(`aziz_${key}`);
                return data ? JSON.parse(data) : null;
            } catch (e) {
                return null;
            }
        }

        async processRetryQueue() {
            if (!this.isOnline || this.retryQueue.length === 0) return;
            console.log(`📦 Traitement de ${this.retryQueue.length} éléments en queue`);
            const queue = [...this.retryQueue];
            this.retryQueue = [];
            for (const item of queue) {
                await this.save(item.key, item.data, item.userId);
            }
        }

        hash(data) {
            const json = JSON.stringify(data);
            let hash = 0;
            for (let i = 0; i < json.length; i++) {
                const char = json.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }

        getStatus() {
            return {
                isOnline: this.isOnline,
                retryQueueLength: this.retryQueue.length
            };
        }
    }

            format: (n) => (Math.round(n * 100) / 100).toFixed(2)
        },
        getStatus() {
            return this.storage.getStatus();
        }
    };

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // ================================================================
        // CONSTANTES
        // ================================================================
        const KEYS = {
            PRODUCTS: 'products',
            SALES: 'sales',
            EXPENSES: 'expenses',
            SHOP: 'shop',
            USERS: 'users',
            CURRENT_USER: 'current_user',
            SUPPLIERS: 'suppliers',
            PURCHASES: 'purchases',
            CUSTOMERS: 'customers',
            AUDIT: 'audit',
            SHOPS: 'shops',
            ARCHIVED_BENEFITS: 'archived_benefits'
        };

        const ALL_PERMS = ['pos','stock_view','stock_edit','history_all','expenses','debt','reports','suppliers','customers','employees','settings','audit'];
        const DEFAULT_EMP_PERMS = ['pos','stock_view','history_own'];
        const STOCK_PAGE_SIZE = 50;

        // ================================================================
        // UTILITAIRES
        // ================================================================
        const roundTo = (val, d = 2) => {
            if (!Number.isFinite(val)) return 0;
            const f = Math.pow(10, d);
            return Math.round((val + Number.EPSILON) * f) / f;
        };

        const generateBarcode = () => {
            const base = ('200' + Date.now().toString().slice(-9)).slice(0, 12);
            let sum = 0;
            for (let i = 0; i < 12; i++) sum += Number(base[i]) * (i % 2 === 0 ? 1 : 3);
            const check = (10 - (sum % 10)) % 10;
            return base + check;
        };

        const hashPwd = (str) => {
            let h = 0; const s = 'aziz_salt_' + (str || '');
            for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
            return String(h);
        };

        // ================================================================
        // STOCK MANAGER
        // ================================================================
        class StockManager {
            constructor(product) {
                if (!product) {
                    this.baseStock = 0; this.baseUnit = 'Unité'; this.variants = [];
                    return;
                }
                this.baseStock = Number(product.stock) || 0;
                this.baseUnit = product.baseUnit || 'Unité';
                this.variants = product.variants || [];
            }

            canSell(variant, qty) {
                if (!variant || qty <= 0) return false;
                return this.baseStock >= roundTo(variant.coefficient * qty, 3) - 0.001;
            }

            deduct(variant, qty) {
                if (!this.canSell(variant, qty)) return null;
                return Math.max(0, roundTo(this.baseStock - roundTo(variant.coefficient * qty, 3), 3));
            }

            getBreakdown() {
                try {
                    const s = this.baseStock;
                    if (s < 0) return { text: 'Stock négatif!' };
                    const vs = (this.variants || []).filter(v => Number(v.coefficient) > 0);
                    const subV = vs.filter(v => Number(v.coefficient) < 1)
                        .sort((a, b) => Number(a.coefficient) - Number(b.coefficient))[0];
                    if (!subV) return { text: `${roundTo(s)} ${this.baseUnit}` };
                    const wholes = Math.floor(s + 0.0001);
                    const frac = roundTo(s - wholes);
                    const subQty = roundTo(frac / Number(subV.coefficient), 3);
                    const text = subQty > 0 ? `${wholes} ${this.baseUnit} + ${roundTo(subQty)} ${subV.label}` : `${wholes} ${this.baseUnit}`;
                    return { text };
                } catch (e) {
                    return { text: 'Erreur stock' };
                }
            }
        }

        const stockBreakdown = (p) => {
            try {
                if (!p) return { text: '0' };
                return new StockManager(p).getBreakdown();
            } catch { return { text: 'Erreur' }; }
        };

        // ================================================================
        // STORAGE HELPER
        // ================================================================
        const storage = {
            get: (k, def = []) => {
                try {
                    const data = localStorage.getItem(`aziz_${k}`);
                    return data ? JSON.parse(data) : def;
                } catch { return def; }
            },
            set: (k, v) => {
                try { localStorage.setItem(`aziz_${k}`, JSON.stringify(v)); } catch {}
            }
        };

        // ================================================================
        // TOAST SYSTEM
        // ================================================================
        function showToast(message, type = 'info', duration = 3000) {
            const event = new CustomEvent('aziz-toast', { detail: { message, type, duration } });
            window.dispatchEvent(event);
        }

        function ToastContainer() {
            const [toasts, setToasts] = useState([]);
            useEffect(() => {
                const handler = (e) => {
                    const { message, type, duration } = e.detail;
                    const id = Date.now();
                    setToasts(prev => [...prev, { id, message, type }]);
                    setTimeout(() => { setToasts(prev => prev.filter(t => t.id !== id)); }, duration || 3000);
                };
                window.addEventListener('aziz-toast', handler);
                return () => window.removeEventListener('aziz-toast', handler);
            }, []);
            if (toasts.length === 0) return null;
            return (
                <div className="toast-container">
                    {toasts.map(t => (
                        <div key={t.id} className={`toast ${t.type}`}>{t.message}</div>
                    ))}
                </div>
            );
        }

        // ================================================================
        // ICON
        // ================================================================
        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    try { window.lucide.createIcons(); } catch (e) {}
                }
            }, [name, size]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }} ref={ref}></i>;
        };

        // ================================================================
        // BARCODE
        // ================================================================
        const Barcode = ({ value, height = 50, displayValue = true, className = '' }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current || !value || !window.JsBarcode) return;
                try {
                    window.JsBarcode(ref.current, String(value), {
                        format: 'CODE128', height, displayValue,
                        fontSize: 12, margin: 4, background: '#ffffff'
                    });
                } catch (e) {}
            }, [value, height, displayValue]);
            if (!value) return null;
            return <svg ref={ref} className={className}></svg>;
        };

        // ================================================================
        // BARCODE SCANNER
        // ================================================================
        function BarcodeScanner({ onDetected, onClose }) {
            useEffect(() => {
                if (!window.Html5Qrcode) {
                    showToast("Scanner non disponible", "error");
                    onClose();
                    return;
                }
                const scanner = new window.Html5Qrcode("bc-reader");
                scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                    scanner.stop().then(() => onDetected(txt));
                }, () => {}).catch(e => {
                    showToast("Caméra inaccessible", "error");
                    onClose();
                });
                return () => { try { scanner.stop().catch(()=>{}); } catch(e){} };
            }, []);
            return (
                <div className="fixed inset-0 z-[300] bg-black/90 flex flex-col items-center justify-center p-4">
                    <div className="bg-white rounded-3xl p-4 w-full max-w-md">
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-black uppercase text-sm">Scanner</h3>
                            <button onClick={onClose} className="p-2 bg-slate-100 rounded-lg"><Icon name="x" size={16}/></button>
                        </div>
                        <div id="bc-reader" className="w-full"></div>
                        <p className="text-[10px] text-slate-400 text-center mt-2 font-bold uppercase">Pointez la caméra</p>
                    </div>
                </div>
            );
        }

        // ================================================================
        // PAGINATION HOOK
        // ================================================================
        function usePaginatedStock(products) {
            const [page, setPage] = useState(0);
            const [searchTerm, setSearchTerm] = useState('');

            const filtered = useMemo(() => {
                if (!searchTerm.trim()) return products;
                const q = searchTerm.toLowerCase().trim();
                return products.filter(p =>
                    p.name.toLowerCase().includes(q) ||
                    (p.barcode || '').includes(q)
                );
            }, [products, searchTerm]);

            const totalPages = Math.max(1, Math.ceil(filtered.length / STOCK_PAGE_SIZE));
            const currentPage = Math.min(page, totalPages - 1);
            const start = currentPage * STOCK_PAGE_SIZE;
            const end = Math.min(start + STOCK_PAGE_SIZE, filtered.length);

            return {
                pageItems: filtered.slice(start, end),
                currentPage,
                totalPages,
                setPage,
                searchTerm,
                setSearchTerm,
                totalItems: filtered.length
            };
        }

        // ================================================================
        // NAVIGATION ITEM
        // ================================================================
        function NavItem({ active, icon, label, onClick, badge }) {
            return (
                <button
                    onClick={onClick}
                    className={`flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all active:scale-95 w-full ${active ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-slate-800'} relative`}
                >
                    <Icon name={icon} /> {label}
                    {badge > 0 && <span className="absolute right-2 top-1/2 -translate-y-1/2 bg-red-600 text-[8px] text-white px-2 py-1 rounded-full">{badge}</span>}

        }

        // STAT CARD
        // ================================================================
        function StatCard({ label, val, color, bg, icon }) {

                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                    <div>
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{label}</p>
                        <p className={`text-2xl font-black ${color}`}>{val}</p>
                    </div>
                    <div className={`p-3 rounded-xl ${bg} ${color}`}><Icon name={icon} /></div>
                </div>
            );
        }

        // ================================================================
        // DASHBOARD
        // ================================================================
        function Dashboard({ products, sales, expenses }) {
            const active = sales.filter(s => s.status === 'active');
            const totalRec = active.reduce((s, x) => s + x.total, 0);
            const profitSales = active.reduce((s, x) => s + x.profit, 0);
            let profitArchived = 0;
            try {
                profitArchived = JSON.parse(localStorage.getItem('aziz_archived_benefits') || '[]')
                    .reduce((s, x) => s + (x.benefit || 0), 0);
            } catch {}
            const profitTotal = profitSales + profitArchived;
            const totalExp = expenses.reduce((s, x) => s + x.amount, 0);

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Tableau de Bord</h2>
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3 md:gap-4">
                        <StatCard label="Recettes" val={`${totalRec.toLocaleString()} F`} color="text-green-600" bg="bg-green-100" icon="trending-up" />
                        <StatCard label="Bénéfice" val={`${(profitTotal - totalExp).toLocaleString()} F`} color="text-blue-600" bg="bg-blue-100" icon="wallet" />
                        <StatCard label="Dépenses" val={`${totalExp.toLocaleString()} F`} color="text-red-500" bg="bg-red-100" icon="credit-card" />
                        <StatCard label="Dettes" val={`${sales.filter(s => s.payMethod === 'credit' && s.status === 'active').reduce((s,x)=>s+x.total, 0).toLocaleString()} F`} color="text-orange-600" bg="bg-orange-100" icon="coins" />
                        <StatCard label="Alertes" val={products.filter(p => p.stock <= p.minStock).length} color="text-orange-600" bg="bg-orange-100" icon="alert-triangle" />
                    </div>
                </div>

        }
