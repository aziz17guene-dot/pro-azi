        // ================================================================
        // POS (CAISSE)
        // ================================================================
        function POS({ products, onSale, autoPrint, setAutoPrint, customers = [], setCustomers }) {
            const [search, setSearch] = useState('');
            const [cart, setCart] = useState([]);
            const [payMethod, setPayMethod] = useState('cash');
            const [customer, setCustomer] = useState('');
            const [customerId, setCustomerId] = useState('');
            const [received, setReceived] = useState('');
            const [mobileAmount, setMobileAmount] = useState('');
            const [mobileProvider, setMobileProvider] = useState('Wave');
            const [discount, setDiscount] = useState('');
            const [scanning, setScanning] = useState(false);

            const filtered = useMemo(() => {
                if (!search.trim()) return products;
                const q = search.toLowerCase().trim();
                return products.filter(p => p.name.toLowerCase().includes(q) || (p.barcode || '').includes(q));
            }, [search, products]);

            const subtotal = cart.reduce((s, it) => s + (it.price * it.q), 0);
            const discountVal = Number(discount) || 0;
            const totalAmount = subtotal - discountVal;
            const cashPart = Number(received) || 0;
            const mobilePart = Number(mobileAmount) || 0;
            const totalPaid = payMethod === 'mixed' ? cashPart + mobilePart : payMethod === 'cash' ? cashPart : payMethod === 'mobile' ? mobilePart : 0;
            const changeAmount = (payMethod === 'cash' || payMethod === 'mixed') ? Math.max(0, totalPaid - totalAmount) : 0;

            const addToCart = useCallback((p, v) => {
                if (p.stock < v.coefficient) {
                    showToast("Stock insuffisant !", "error");
                    return;
                }
                setCart(prev => {
                    const existing = prev.find(x => x.pid === p.id && x.vid === v.id);
                    if (existing) return prev.map(x => (x.pid === p.id && x.vid === v.id) ? { ...x, q: x.q + 1 } : x);
                    const unitCost = Number((p.purchasePrice * v.coefficient).toFixed(2));
                    return [...prev, { pid: p.id, pname: p.name, vid: v.id, vlabel: v.label, price: v.price, coef: v.coefficient, q: 1, unitCost }];
                });
            }, []);

            const onScanned = (code) => {
                setScanning(false);
                const p = products.find(x => x.barcode === code);
                if (!p) return showToast("Code-barres inconnu", "error");
                if (!p.variants || !p.variants.length) return showToast("Produit sans variante", "error");
                addToCart(p, p.variants[0]);
            };

            const validate = useCallback(() => {
                if (!cart.length) return showToast("Panier vide", "warning");
                if (payMethod !== 'credit' && totalPaid < totalAmount) return showToast("Montant insuffisant", "error");

                const grossSubtotal = cart.reduce((s, it) => s + it.price * it.q, 0) || 1;
                const items = cart.map(it => {
                    const prod = products.find(x => x.id === it.pid);
                    const unitCost = it.unitCost != null ? it.unitCost : (prod ? Number((prod.purchasePrice * it.coef).toFixed(2)) : 0);
                    const lineGross = it.price * it.q;
                    const lineDiscount = Number(((discountVal || 0) * (lineGross / grossSubtotal)).toFixed(2));
                    const lineNet = Number((lineGross - lineDiscount).toFixed(2));
                    const lineCost = Number((unitCost * it.q).toFixed(2));
                    const lineProfit = Number((lineNet - lineCost).toFixed(2));
                    return { ...it, unitCost, total: lineGross, lineDiscount, lineNet, lineCost, lineProfit, qtyBase: Number((it.q * it.coef).toFixed(3)) };
                });

                const totalProfit = Number(items.reduce((s, it) => s + (it.lineProfit || 0), 0).toFixed(2));

                const sale = {
                    id: Date.now(),
                    num: Date.now().toString().slice(-6),
                    date: new Date().toISOString(),
                    items,
                    subtotal: Number(subtotal.toFixed(2)),
                    discount: discountVal,
                    total: Number(totalAmount.toFixed(2)),
                    received: payMethod === 'credit' ? 0 : Number(totalPaid.toFixed(2)),
                    change: changeAmount,
                    payMethod,
                    payments: payMethod === 'mixed' ? [{ type: 'cash', amount: cashPart }, { type: 'mobile', provider: mobileProvider, amount: mobilePart }] :
                              payMethod === 'mobile' ? [{ type: 'mobile', provider: mobileProvider, amount: mobilePart }] :
                              payMethod === 'cash' ? [{ type: 'cash', amount: cashPart }] :
                              [{ type: 'credit', amount: totalAmount }],
                    customer: customer || (customers.find(c => c.id === customerId)?.name || ''),
                    customerId: customerId || null,
                    profit: totalProfit,
                    status: 'active'
                };

                onSale(sale);
                setCart([]);
                setCustomer('');
                setCustomerId('');
                setReceived('');
                setMobileAmount('');
                setDiscount('');
                showToast("Vente #" + sale.num + " ✅", "success");
            }, [cart, payMethod, totalPaid, totalAmount, discountVal, subtotal, cashPart, mobilePart, mobileProvider, customer, customerId, customers, onSale]);

            return (
                <div className="flex flex-col lg:flex-row gap-4 h-full">
                    <div className="flex-1 flex flex-col gap-3 overflow-hidden">
                        <div className="flex gap-2">
                            <div className="flex-1 relative">
                                <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="Rechercher..." value={search} onChange={e => setSearch(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-white border border-slate-100 rounded-2xl shadow-sm outline-none text-sm" />
                            </div>
                            <button onClick={() => setScanning(true)} className="px-4 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase flex items-center gap-1">
                                <Icon name="scan-line" size={16}/> Scan
                            </button>
                        </div>

                        {scanning && <BarcodeScanner onClose={() => setScanning(false)} onDetected={onScanned} />}

                        <div className="flex-1 overflow-y-auto grid grid-cols-2 sm:grid-cols-3 gap-3 custom-scroll">
                            {filtered.length === 0 && <div className="col-span-3 text-center py-20 text-slate-400 italic">Aucun produit</div>}
                            {filtered.map(p => (
                                <div key={p.id} className={`bg-white p-3 rounded-2xl border shadow-sm flex flex-col justify-between hover:border-blue-500 transition-colors ${p.stock <= p.minStock ? 'border-orange-200 bg-orange-50/30' : 'border-slate-100'}`}>
                                    <div>
                                        <div className="flex justify-between items-start mb-1">
                                            <h4 className="font-bold text-xs truncate flex-1">{p.name}</h4>
                                            {p.stock <= p.minStock && <span className="text-orange-600"><Icon name="alert-triangle" size={14}/></span>}
                                        </div>
                                        <p className={`text-[10px] font-bold leading-tight ${p.stock <= p.minStock ? 'text-orange-600' : 'text-slate-500'}`}>
                                            Stock: {stockBreakdown(p).text}
                                        </p>
                                    </div>
                                    <div className="mt-2 space-y-1">
                                        {(p.variants && p.variants.length ? p.variants : [{ id: 'default', label: p.baseUnit || 'Unité', coefficient: 1, price: p.salePrice }]).map(v => (
                                            <button key={v.id} onClick={() => addToCart(p, v)} className="w-full text-left py-1.5 px-2 bg-slate-50 hover:bg-blue-600 hover:text-white rounded-lg flex justify-between items-center transition-all text-[9px] font-black uppercase">
                                                <span>{v.label}</span>
                                                <span>{Number(v.price).toLocaleString()} F</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="w-full lg:w-80 bg-white rounded-3xl border border-slate-100 shadow-xl flex flex-col overflow-hidden">
                        <div className="p-4 bg-slate-900 text-white flex justify-between items-center">
                            <h3 className="font-bold text-xs uppercase tracking-widest">Panier</h3>
                            <span className="bg-blue-600 px-2 rounded-full text-[10px]">{cart.length}</span>
                        </div>

                        <div className="flex-1 p-4 space-y-2 overflow-y-auto custom-scroll">
                            {cart.map((it, i) => (
                                <div key={i} className="flex justify-between items-center text-sm border-b pb-1">
                                    <div><p className="font-bold text-xs">{it.pname}</p><p className="text-[9px] text-slate-400">{it.vlabel} x{it.q}</p></div>
                                    <div className="flex items-center gap-2">
                                        <span className="font-black text-sm">{(it.price * it.q).toLocaleString()} F</span>
                                        <button onClick={() => setCart(c => c.filter((_, idx) => idx !== i))} className="text-red-400"><Icon name="trash-2" size={14}/></button>
                                    </div>
                                </div>
                            ))}
                            {!cart.length && <p className="text-center py-10 text-slate-300 italic text-sm">Panier vide</p>}
                        </div>

                        <div className="p-4 bg-slate-50 border-t space-y-2">
                            <div className="grid grid-cols-4 gap-1">
                                {['cash','mobile','mixed','credit'].map(m => (
                                    <button key={m} onClick={() => setPayMethod(m)} className={`py-1.5 rounded-lg text-[8px] font-black uppercase ${payMethod === m ? 'bg-blue-600 text-white' : 'bg-white border'}`}>
                                        {m === 'cash' ? 'Cash' : m === 'mobile' ? 'Mobile' : m === 'mixed' ? 'Mixte' : 'Crédit'}
                                    </button>
                                ))}
                            </div>

                            <div className="grid grid-cols-2 gap-2">
                                <div>
                                    <label className="text-[8px] font-black text-slate-400 uppercase">Remise</label>
                                    <input type="number" placeholder="0" value={discount} onChange={e => setDiscount(e.target.value)} className="w-full p-1.5 border rounded-xl outline-none text-xs font-bold text-red-500" />
                                </div>
                                {(payMethod === 'cash' || payMethod === 'mixed') && (
                                    <div>
                                        <label className="text-[8px] font-black text-slate-400 uppercase">Espèces</label>
                                        <input type="number" placeholder="0" value={received} onChange={e => setReceived(e.target.value)} className="w-full p-1.5 border rounded-xl outline-none text-xs font-bold text-green-600" />
                                    </div>
                                )}
                            </div>

                            {(payMethod === 'mobile' || payMethod === 'mixed') && (
                                <div className="grid grid-cols-2 gap-2">
                                    <select value={mobileProvider} onChange={e => setMobileProvider(e.target.value)} className="p-1.5 border rounded-xl text-xs font-bold">
                                        <option>Wave</option><option>Orange Money</option><option>Free Money</option><option>Wizall</option>
                                    </select>
                                    <input type="number" placeholder="Montant" value={mobileAmount} onChange={e => setMobileAmount(e.target.value)} className="p-1.5 border rounded-xl text-xs font-bold text-purple-600"/>
                                </div>
                            )}

                            {(customers.length > 0 || payMethod === 'credit') && (
                                <div>
                                    <label className="text-[8px] font-black text-slate-400 uppercase">Client</label>
                                    <select value={customerId} onChange={e => { setCustomerId(e.target.value); setCustomer(''); }} className="w-full p-1.5 border rounded-xl text-[10px] font-bold">
                                        <option value="">— Aucun —</option>
                                        {customers.map(c => <option key={c.id} value={c.id}>{c.name} ({c.points||0} pts)</option>)}
                                    </select>
                                    {!customerId && <input placeholder="Nom" value={customer} onChange={e => setCustomer(e.target.value)} className="w-full p-1.5 border rounded-xl text-[10px] font-bold mt-1"/>}
                                </div>
                            )}

                            <div className="pt-2 border-t">
                                <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase"><span>Sous-Total</span><span>{subtotal.toLocaleString()} F</span></div>
                                {discountVal > 0 && <div className="flex justify-between text-[10px] font-bold text-red-400 uppercase"><span>Remise</span><span>-{discountVal.toLocaleString()} F</span></div>}
                                <div className="flex justify-between font-black mt-1"><span className="text-xs uppercase italic">Net</span><span className="text-lg text-blue-600">{totalAmount.toLocaleString()} F</span></div>
                                {(payMethod === 'cash' || payMethod === 'mixed') && totalPaid > 0 && (
                                    <div className="flex justify-between text-[10px] font-bold uppercase mt-1"><span className="text-slate-400">Rendu</span><span className="text-green-600 font-black">{changeAmount.toLocaleString()} F</span></div>
                                )}
                            </div>

                            <div className="flex items-center justify-between p-2 bg-blue-50 rounded-xl border border-blue-100">
                                <div className="flex items-center gap-2">
                                    <Icon name="printer" size={14} className="text-blue-600" />
                                    <span className="text-[9px] font-black uppercase text-blue-800">Impression Auto</span>
                                </div>
                                <button onClick={() => setAutoPrint(!autoPrint)} className={`w-10 h-5 rounded-full relative transition-all duration-300 ${autoPrint ? 'bg-blue-600' : 'bg-slate-300'}`}>
                                    <div className={`absolute top-1 w-3 h-3 bg-white rounded-full transition-all duration-300 ${autoPrint ? 'left-6' : 'left-1'}`}></div>
                                </button>
                            </div>

                            <button onClick={validate} disabled={!cart.length} className="w-full py-3 bg-blue-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 disabled:bg-slate-200">
                                Encaisser ({totalAmount.toLocaleString()} F)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ================================================================
        // STOCK MANAGEMENT
        // ================================================================
        function Stock({ items, onAdd, onEdit, onDelete, onGoToSale, readOnly }) {
            const [showModal, setShowModal] = useState(false);
            const [editing, setEditing] = useState(null);
            const [form, setForm] = useState({ name: '', category: 'Alimentaire', purchasePrice: '', salePrice: '', stock: '', baseUnit: 'Litre', minStock: '5', barcode: '', expiryDate: '' });
            const [variants, setVariants] = useState([{ id: 'v1', label: 'Unité (Base)', coefficient: 1, price: '' }]);
            const [scanning, setScanning] = useState(false);
            const { pageItems, currentPage, totalPages, setPage, searchTerm, setSearchTerm, totalItems } = usePaginatedStock(items);

            const openAdd = () => {
                setEditing(null);
                setForm({ name: '', category: 'Alimentaire', purchasePrice: '', salePrice: '', stock: '', baseUnit: 'Litre', minStock: '5', barcode: '', expiryDate: '' });
                setVariants([{ id: 'v1', label: 'Unité (Base)', coefficient: 1, price: '' }]);
                setShowModal(true);
            };

            const openEdit = (p) => {
                setEditing(p);
                setForm({ ...p, barcode: p.barcode || '', expiryDate: p.expiryDate || '' });
                setVariants(p.variants || [{ id: 'v1', label: 'Unité (Base)', coefficient: 1, price: '' }]);
                setShowModal(true);
            };

            const save = () => {
                if (!form.name || !form.purchasePrice || !form.salePrice) {
                    showToast("Remplissez tous les champs", "error");
                    return;
                }
                const product = {
                    ...form,
                    id: editing ? editing.id : Date.now().toString(),
                    purchasePrice: Number(form.purchasePrice) || 0,
                    salePrice: Number(form.salePrice) || 0,
                    stock: Number(form.stock) || 0,
                    minStock: Number(form.minStock) || 0,
                    variants: variants.map(v => ({ ...v, coefficient: Number(v.coefficient) || 1, price: Number(v.price) || 0 }))
                };
                try {
                    if (editing) onEdit(product);
                    else onAdd(product);
                    setShowModal(false);
                    showToast(editing ? "Produit modifié" : "Produit ajouté", "success");
                } catch (e) {
                    showToast("Erreur d'enregistrement", "error");
                }
            };

            return (
                <div className="space-y-4">
                    <header className="flex justify-between items-center flex-wrap gap-2">
                        <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Stock</h2>
                        <div className="flex gap-2 flex-wrap">
                            <button onClick={onGoToSale} className="px-4 py-2.5 bg-green-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-1">
                                <Icon name="shopping-cart" size={14}/> Vente
                            </button>
                            {!readOnly && (
                                <button onClick={openAdd} className="px-4 py-2.5 bg-blue-600 text-white rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center gap-1">
                                    <Icon name="plus" size={14}/> Nouveau
                                </button>
                            )}
                        </div>
                    </header>

                    <div className="flex flex-wrap gap-2 items-center bg-white p-2 rounded-2xl border">
                        <Icon name="search" size={16} className="text-slate-400 ml-2"/>
                        <input value={searchTerm} onChange={e => { setSearchTerm(e.target.value); setPage(0); }} placeholder="Rechercher..." className="flex-1 p-2 outline-none font-bold text-sm min-w-[120px]" />
                        <button onClick={() => setScanning(true)} className="px-3 py-2 bg-slate-900 text-white rounded-xl text-[10px] font-black uppercase flex items-center gap-1">
                            <Icon name="scan-line" size={14}/> Scan
                        </button>
                        <span className="text-[10px] text-slate-400">{totalItems} produits</span>
                    </div>

                    {scanning && <BarcodeScanner onClose={()=>setScanning(false)} onDetected={(code)=>{ setScanning(false); const found = items.find(p => p.barcode === code); if (found) openEdit(found); else { setSearchTerm(code); showToast("Aucun produit", "warning"); } }} />}

                    <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b tracking-widest sticky top-0">
                                    <tr><th className="p-4">Nom</th><th className="p-2">Catégorie</th><th className="p-2">Stock</th>{!readOnly && <th className="p-2">Achat</th>}<th className="p-2">Vente</th>{!readOnly && <th className="p-4 text-right">Actions</th>}</tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 text-sm font-bold">
                                    {pageItems.length === 0 && <tr><td colSpan="6" className="p-10 text-center text-slate-400 italic">Aucun produit</td></tr>}
                                    {pageItems.map(p => (
                                        <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 text-sm">{p.name}</td>
                                            <td className="text-[10px] text-slate-400">{p.category}</td>
                                            <td><span className={`px-2 py-0.5 rounded-full text-[10px] ${p.stock <= p.minStock ? 'bg-red-100 text-red-600' : 'bg-slate-100'}`}>{stockBreakdown(p).text}</span></td>
                                            {!readOnly && <td className="text-xs">{p.purchasePrice} F</td>}
                                            <td className="font-black text-blue-600">{p.salePrice} F</td>
                                            {!readOnly && (
                                                <td className="p-4 text-right flex justify-end gap-1">
                                                    <button onClick={() => openEdit(p)} className="p-1.5 hover:bg-blue-50 hover:text-blue-600 rounded-lg"><Icon name="edit" size={14}/></button>
                                                    <button onClick={() => confirm("Supprimer ?") && onDelete(p.id)} className="p-1.5 hover:bg-red-50 hover:text-red-600 rounded-lg"><Icon name="trash-2" size={14}/></button>
                                                </td>
                                            )}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        {totalPages > 1 && (
                            <div className="flex items-center justify-between px-4 py-2 border-t bg-slate-50/50">
                                <span className="text-[10px] text-slate-500">Page {currentPage+1}/{totalPages}</span>
                                <div className="flex gap-1">
                                    <button onClick={() => setPage(p => Math.max(0, p-1))} disabled={currentPage === 0} className="px-3 py-1 bg-white border rounded-lg text-xs font-bold disabled:opacity-50">◀</button>
                                    <button onClick={() => setPage(p => Math.min(totalPages-1, p+1))} disabled={currentPage >= totalPages-1} className="px-3 py-1 bg-white border rounded-lg text-xs font-bold disabled:opacity-50">▶</button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Modal Formulaire - simplifié mais complet */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-2xl rounded-3xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
                                <div className="p-4 border-b flex justify-between items-center bg-slate-900 text-white">
                                    <h3 className="text-lg font-black uppercase">{editing ? 'Modifier' : 'Nouveau Produit'}</h3>
                                    <button onClick={() => setShowModal(false)}><Icon name="x" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 custom-scroll space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Nom</label><input value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm" /></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Catégorie</label><input value={form.category} onChange={e => setForm({...form, category: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm" /></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Unité</label><input value={form.baseUnit} onChange={e => setForm({...form, baseUnit: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm" /></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Stock</label><input type="number" value={form.stock} onChange={e => setForm({...form, stock: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm" /></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Seuil</label><input type="number" value={form.minStock} onChange={e => setForm({...form, minStock: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm text-orange-600" /></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Prix Achat</label><input type="number" value={form.purchasePrice} onChange={e => setForm({...form, purchasePrice: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm text-red-500" /></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Prix Vente</label><input type="number" value={form.salePrice} onChange={e => setForm({...form, salePrice: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm text-blue-600" /></div>
                                        <div className="md:col-span-2"><label className="text-[10px] font-black text-slate-400 uppercase">Code-barres</label>
                                            <div className="flex gap-1">
                                                <input value={form.barcode} onChange={e => setForm({...form, barcode: e.target.value})} className="flex-1 p-3 bg-slate-50 border rounded-xl font-bold font-mono text-sm" />
                                                <button onClick={()=>setScanning(true)} className="px-3 bg-slate-900 text-white rounded-xl"><Icon name="scan-line" size={16}/></button>
                                                <button onClick={()=>setForm({...form, barcode: generateBarcode()})} className="px-3 bg-blue-600 text-white rounded-xl"><Icon name="wand-2" size={16}/></button>
                                            </div>
                                            {form.barcode && (
                                                <div className="mt-2 bg-white border rounded-xl p-2 flex items-center justify-between">
                                                    <Barcode value={form.barcode} height={40} />
                                                    <button onClick={()=>{ const w=window.open('','_blank'); if(!w)return; w.document.write(`<html><head><title>${form.name}</title></head><body style="text-align:center;padding:20px;font-family:sans-serif"><h3>${form.name}</h3><div>${form.salePrice} F</div><svg id="bc"></svg><script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"><\/script><script>JsBarcode('#bc','${form.barcode}',{format:'CODE128',height:60,fontSize:12});setTimeout(()=>window.print(),300);<\/script></body></html>`); }} className="px-3 py-1 bg-slate-100 text-slate-700 rounded-lg text-[10px] font-black uppercase flex items-center gap-1"><Icon name="printer" size={12}/> Imprimer</button>
                                                </div>
                                            )}
                                        </div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase">Péremption</label><input type="date" value={form.expiryDate} onChange={e => setForm({...form, expiryDate: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm" /></div>
                                    </div>
                                    <div className="border-t pt-4">
                                        <div className="flex justify-between items-center mb-3 bg-slate-900 p-3 rounded-2xl">
                                            <h4 className="font-black text-[10px] uppercase tracking-widest text-blue-400">Variantes</h4>
                                            <div className="flex gap-1">
                                                <button onClick={() => setVariants([...variants, { id: Date.now().toString(), label: 'Demi', coefficient: 0.5, price: '' }])} className="px-2 py-1 bg-slate-800 text-white rounded-lg text-[9px] font-black">+ Demi</button>
                                                <button onClick={() => setVariants([...variants, { id: Date.now().toString(), label: 'Quart', coefficient: 0.25, price: '' }])} className="px-2 py-1 bg-slate-800 text-white rounded-lg text-[9px] font-black">+ Quart</button>
                                                <button onClick={() => setVariants([...variants, { id: Date.now().toString(), label: '', coefficient: 1, price: '' }])} className="px-2 py-1 bg-blue-600 text-white rounded-lg text-[9px] font-black">+</button>
                                            </div>
                                        </div>
                                        {variants.map((v, i) => (
                                            <div key={v.id} className="grid grid-cols-4 gap-2 items-end bg-slate-50 p-2 rounded-xl mb-2">
                                                <div><label className="text-[8px] font-black text-slate-400 uppercase">Libellé</label><input value={v.label} onChange={e => setVariants(variants.map((x,idx) => idx === i ? {...x, label: e.target.value} : x))} className="w-full p-2 bg-white rounded-lg text-xs" /></div>
                                                <div><label className="text-[8px] font-black text-slate-400 uppercase">Coef</label><input type="number" step="0.01" value={v.coefficient} onChange={e => setVariants(variants.map((x,idx) => idx === i ? {...x, coefficient: e.target.value} : x))} className="w-full p-2 bg-white rounded-lg text-xs" /></div>
                                                <div><label className="text-[8px] font-black text-slate-400 uppercase">Prix</label><input type="number" value={v.price} onChange={e => setVariants(variants.map((x,idx) => idx === i ? {...x, price: e.target.value} : x))} className="w-full p-2 bg-white rounded-lg text-xs font-black" /></div>
                                                <div className="text-right">{variants.length > 1 && <button onClick={() => setVariants(variants.filter((_,idx) => idx !== i))} className="text-red-400"><Icon name="trash-2" size={14}/></button>}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-4 bg-white border-t flex gap-3">
                                    <button onClick={save} className="flex-[2] py-3 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-[10px]">Enregistrer</button>
                                    <button onClick={() => setShowModal(false)} className="flex-1 py-3 bg-slate-100 text-slate-500 rounded-2xl font-black uppercase tracking-widest text-[10px]">Fermer</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ================================================================
        // FOURNISSEURS
        // ================================================================
        function Suppliers({ suppliers, setSuppliers, purchases, products, onReceive }) {
            const [tab, setTab] = useState('list');
            const [showForm, setShowForm] = useState(false);
            const [form, setForm] = useState({ name: '', phone: '', contact: '', notes: '' });
            const [poForm, setPoForm] = useState(null);

            const save = () => {
                if (!form.name.trim()) return showToast("Nom requis", "error");
                setSuppliers([...suppliers, { id: 'S-' + Date.now(), ...form, createdAt: new Date().toISOString() }]);
                setForm({ name: '', phone: '', contact: '', notes: '' });
                setShowForm(false);
                showToast("Fournisseur ajouté", "success");
            };

            const remove = (id) => {
                if (confirm("Supprimer ce fournisseur ?")) {
                    setSuppliers(suppliers.filter(s => s.id !== id));
                    showToast("Fournisseur supprimé", "success");
                }
            };

            const startPO = (sup) => setPoForm({ supplierId: sup.id, supplierName: sup.name, items: [] });
            const addLine = () => setPoForm(p => ({ ...p, items: [...p.items, { pid: '', qty: 1, unitCost: 0 }] }));
            const updLine = (i, k, v) => setPoForm(p => ({ ...p, items: p.items.map((x,idx)=>idx===i?{...x,[k]:v}:x) }));
            const submitPO = () => {
                const items = poForm.items.filter(i => i.pid && Number(i.qty) > 0).map(i => ({ pid: i.pid, qty: Number(i.qty), unitCost: Number(i.unitCost) }));
                if (!items.length) return showToast("Ajoutez au moins une ligne", "error");
                onReceive({ ...poForm, items, total: items.reduce((s,i)=>s+i.qty*i.unitCost,0) });
                setPoForm(null);
                setTab('po');
                showToast("Réception enregistrée", "success");
            };

            return (
                <div className="space-y-4">
                    <header className="flex justify-between items-center bg-slate-900 p-6 rounded-3xl text-white">
                        <div><h2 className="text-2xl font-black uppercase tracking-tighter">Fournisseurs</h2><p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-1">{suppliers.length} fournisseur(s) • {purchases.length} réappro</p></div>
                        <button onClick={()=>setShowForm(true)} className="px-4 py-3 bg-blue-600 rounded-2xl font-black text-xs uppercase flex items-center gap-2"><Icon name="plus" size={14}/> Nouveau</button>
                    </header>
                    <div className="flex gap-2 bg-white p-1 rounded-2xl border w-fit">
                        <button onClick={()=>setTab('list')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase ${tab==='list'?'bg-blue-600 text-white':'text-slate-500'}`}>Liste</button>
                        <button onClick={()=>setTab('po')} className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase ${tab==='po'?'bg-blue-600 text-white':'text-slate-500'}`}>Reçus</button>
                    </div>
                    {tab==='list' && <div className="grid gap-3 md:grid-cols-2">
                        {suppliers.length===0 && <div className="col-span-2 text-center py-10 text-slate-400 italic">Aucun fournisseur</div>}
                        {suppliers.map(s => (
                            <div key={s.id} className="bg-white p-4 rounded-2xl border shadow-sm">
                                <div className="flex justify-between items-start"><div><h3 className="font-black text-slate-800">{s.name}</h3><p className="text-xs text-slate-500 font-bold">{s.contact} • {s.phone}</p>{s.notes && <p className="text-[10px] text-slate-400 mt-1">{s.notes}</p>}</div><button onClick={()=>remove(s.id)} className="p-2 text-red-400"><Icon name="trash-2" size={14}/></button></div>
                                <button onClick={()=>startPO(s)} className="mt-2 w-full py-2 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-2"><Icon name="package-plus" size={14}/> Réceptionner</button>
                            </div>
                        ))}
                    </div>}
                    {tab==='po' && <div className="bg-white rounded-3xl border overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b"><tr><th className="p-3">Date</th><th>Fournisseur</th><th>Lignes</th><th>Reçu par</th><th className="text-right p-3">Total</th></tr></thead>
                            <tbody>{purchases.length===0 && <tr><td colSpan="5" className="p-10 text-center text-slate-400 italic">Aucun reçu</td></tr>}
                            {purchases.map(p => <tr key={p.id} className="border-b font-bold"><td className="p-3 text-xs">{new Date(p.date).toLocaleDateString()}</td><td>{p.supplierName}</td><td className="text-xs">{p.items.length}</td><td className="text-xs text-slate-400">{p.receivedBy||'-'}</td><td className="text-right p-3 text-emerald-600 font-black">{(p.total||0).toLocaleString()} F</td></tr>)}</tbody>
                        </table>
                    </div>}
                    {showForm && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[200]">
                            <div className="bg-white rounded-3xl p-6 max-w-md w-full space-y-3">
                                <h3 className="font-black uppercase">Nouveau fournisseur</h3>
                                <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nom / Société" className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm"/>
                                <input value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})} placeholder="Contact" className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm"/>
                                <input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="Téléphone" className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm"/>
                                <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Notes" className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm" rows={2}/>
                                <div className="flex gap-2"><button onClick={()=>setShowForm(false)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black uppercase text-xs">Annuler</button><button onClick={save} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black uppercase text-xs">Enregistrer</button></div>
                            </div>
                        </div>
                    )}
                    {poForm && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[200]">
                            <div className="bg-white rounded-3xl p-6 max-w-2xl w-full space-y-3 max-h-[90vh] overflow-y-auto">
                                <h3 className="font-black uppercase">Réception : {poForm.supplierName}</h3>
                                {poForm.items.map((l, i) => (
                                    <div key={i} className="grid grid-cols-12 gap-2 items-end bg-slate-50 p-2 rounded-xl">
                                        <select value={l.pid} onChange={e=>updLine(i,'pid',e.target.value)} className="col-span-6 p-2 bg-white border rounded-lg text-xs font-bold"><option value="">— Produit —</option>{products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
                                        <input type="number" placeholder="Qté" value={l.qty} onChange={e=>updLine(i,'qty',e.target.value)} className="col-span-2 p-2 bg-white border rounded-lg text-xs font-bold"/>
                                        <input type="number" placeholder="Coût" value={l.unitCost} onChange={e=>updLine(i,'unitCost',e.target.value)} className="col-span-3 p-2 bg-white border rounded-lg text-xs font-bold"/>
                                        <button onClick={()=>setPoForm(p=>({...p,items:p.items.filter((_,idx)=>idx!==i)}))} className="col-span-1 p-2 text-red-400"><Icon name="x" size={14}/></button>
                                    </div>
                                ))}
                                <button onClick={addLine} className="w-full py-2 bg-slate-100 rounded-xl font-black uppercase text-[10px]">+ Ajouter ligne</button>
                                <div className="flex gap-2 pt-3 border-t"><button onClick={()=>setPoForm(null)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black uppercase text-xs">Annuler</button><button onClick={submitPO} className="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-black uppercase text-xs">Valider</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ================================================================
        // CLIENTS
        // ================================================================
        function Customers({ customers, setCustomers, sales }) {
            const [showForm, setShowForm] = useState(false);
            const [form, setForm] = useState({ name: '', phone: '' });

            const save = () => {
                if (!form.name.trim()) return showToast("Nom requis", "error");
                setCustomers([...customers, { id: 'C-'+Date.now(), ...form, points: 0, totalSpent: 0, createdAt: new Date().toISOString() }]);
                setForm({ name:'', phone:'' });
                setShowForm(false);
                showToast("Client ajouté", "success");
            };

            const remove = (id) => {
                if (confirm("Supprimer ce client ?")) {
                    setCustomers(customers.filter(c=>c.id!==id));
                    showToast("Client supprimé", "success");
                }
            };

            return (
                <div className="space-y-4">
                    <header className="flex justify-between items-center bg-slate-900 p-6 rounded-3xl text-white">
                        <div><h2 className="text-2xl font-black uppercase tracking-tighter">Clients & Fidélité</h2><p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-1">{customers.length} client(s) • 1 point / 1000 F</p></div>
                        <button onClick={()=>setShowForm(true)} className="px-4 py-3 bg-blue-600 rounded-2xl font-black text-xs uppercase flex items-center gap-2"><Icon name="user-plus" size={14}/> Nouveau</button>
                    </header>
                    <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-3">
                        {customers.length===0 && <div className="col-span-3 text-center py-10 text-slate-400 italic">Aucun client</div>}
                        {customers.map(c => (
                            <div key={c.id} className="bg-white p-4 rounded-2xl border shadow-sm">
                                <div className="flex justify-between items-start"><div><h3 className="font-black text-slate-800">{c.name}</h3><p className="text-[10px] text-slate-400 font-bold">{c.phone || '—'}</p></div><button onClick={()=>remove(c.id)} className="p-2 text-red-400"><Icon name="trash-2" size={14}/></button></div>
                                <div className="mt-2 grid grid-cols-2 gap-2 text-center">
                                    <div className="bg-amber-50 p-2 rounded-xl"><p className="text-[9px] font-black text-amber-600 uppercase">Points</p><p className="font-black text-amber-700 text-lg">{c.points || 0}</p></div>
                                    <div className="bg-blue-50 p-2 rounded-xl"><p className="text-[9px] font-black text-blue-600 uppercase">Dépensé</p><p className="font-black text-blue-700 text-sm">{(c.totalSpent||0).toLocaleString()} F</p></div>
                                </div>
                            </div>
                        ))}
                    </div>
                    {showForm && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[200]">
                            <div className="bg-white rounded-3xl p-6 max-w-md w-full space-y-3">
                                <h3 className="font-black uppercase">Nouveau client</h3>
                                <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nom complet" className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm"/>
                                <input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="Téléphone" className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm"/>
                                <div className="flex gap-2"><button onClick={()=>setShowForm(false)} className="flex-1 py-3 bg-slate-100 rounded-xl font-black uppercase text-xs">Annuler</button><button onClick={save} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-black uppercase text-xs">Enregistrer</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ================================================================
        // AUDIT
        // ================================================================
        function AuditView({ audit }) {
            const [filter, setFilter] = useState('');
            const list = audit.filter(a => !filter || a.action.includes(filter.toUpperCase()) || (a.userName||'').toLowerCase().includes(filter.toLowerCase()));
            const colorOf = (act) => act.includes('SUPPR')?'text-red-600':act.includes('VENTE')?'text-blue-600':act.includes('REAPPRO')?'text-emerald-600':act.includes('LOGIN')||act.includes('LOGOUT')?'text-slate-500':'text-amber-600';

            return (
                <div className="space-y-4">
                    <header className="flex justify-between items-center bg-slate-900 p-6 rounded-3xl text-white">
                        <div><h2 className="text-2xl font-black uppercase tracking-tighter">Journal d'Audit</h2><p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-1">{audit.length} événements</p></div>
                        <input placeholder="Filtrer..." value={filter} onChange={e=>setFilter(e.target.value)} className="px-4 py-2 bg-slate-800 border border-slate-700 rounded-xl text-sm font-bold text-white placeholder:text-slate-500"/>
                    </header>
                    <div className="bg-white rounded-3xl border overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b"><tr><th className="p-3">Date</th><th>Utilisateur</th><th>Action</th><th>Détails</th></tr></thead>
                            <tbody>{list.length===0 && <tr><td colSpan="4" className="p-10 text-center text-slate-400 italic">Aucun événement</td></tr>}
                            {list.slice(0,500).map(a => <tr key={a.id} className="border-b font-bold"><td className="p-3 text-[10px] text-slate-400">{new Date(a.date).toLocaleString()}</td><td className="text-xs">{a.userName}</td><td className={`text-[10px] font-black uppercase ${colorOf(a.action)}`}>{a.action}</td><td className="text-[10px] text-slate-500">{a.details}</td></tr>)}</tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ================================================================
        // HISTORIQUE
        // ================================================================
        function History({ sales, setSales, setProducts, onPrint, readOnly }) {
            const [page, setPage] = useState(0);
            const pageSize = 30;

            const sortedSales = useMemo(() => {
                return [...sales].filter(s => s.status !== 'deleted').sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [sales]);

            const visibleSales = useMemo(() => sortedSales.slice(0, (page + 1) * pageSize), [sortedSales, page]);
            const hasMore = sortedSales.length > visibleSales.length;

            const cancel = (id) => {
                const s = sales.find(x => x.id === id);
                if (!s || !confirm("Inverser cette vente ?")) return;
                setProducts(v => v.map(p => {
                    const item = s.items.find(it => it.pid === p.id);
                    return item ? { ...p, stock: Number((p.stock + item.qtyBase).toFixed(3)) } : p;
                }));
                setSales(v => v.map(x => x.id === id ? { ...x, status: 'canceled' } : x));
                showToast("Vente annulée", "warning");
            };

            const deleteSale = (sale) => {
                if (!confirm(`Supprimer #${sale.num} ?`)) return;
                setSales(prev => prev.map(x => x.id === sale.id ? { ...x, status: 'deleted', deletedAt: new Date().toISOString() } : x));
                showToast("Vente supprimée", "success");
            };

            return (
                <div className="space-y-4">
                    <h2 className="text-2xl font-black uppercase text-slate-800">Historique</h2>
                    {visibleSales.length === 0 && <div className="py-20 text-center text-slate-300 italic bg-white rounded-3xl border">Aucune vente</div>}
                    {visibleSales.map(s => (
                        <div key={s.id} className={`p-4 bg-white rounded-2xl border ${s.status==='canceled'?'opacity-50 line-through':''} flex justify-between items-center shadow-sm hover:border-blue-100 transition-all`}>
                            <div>
                                <p className="text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-1">#{s.num} {s.sellerName ? `• ${s.sellerName}` : ''}</p>
                                <p className="text-lg font-black text-slate-800">{s.total} F</p>
                                <p className="text-[10px] font-bold text-slate-400 flex gap-2 capitalize">{new Date(s.date).toLocaleString()} &bull; {s.payMethod}</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => onPrint(s)} className="p-2 bg-blue-50 text-blue-600 rounded-xl"><Icon name="printer" size={16}/></button>
                                {!readOnly && s.status==='active' && <button onClick={() => cancel(s.id)} className="p-2 bg-orange-50 text-orange-600 rounded-xl"><Icon name="alert-triangle" size={16}/></button>}
                                {!readOnly && <button onClick={() => deleteSale(s)} className="p-2 bg-red-50 text-red-500 rounded-xl"><Icon name="trash-2" size={16}/></button>}
                            </div>
                        </div>
                    ))}
                    {hasMore && (
                        <button onClick={() => setPage(p => p + 1)} className="w-full py-2 bg-slate-100 rounded-xl font-black uppercase text-xs hover:bg-slate-200 transition-colors">
                            Charger plus ({sortedSales.length - visibleSales.length} restants)
                        </button>
                    )}
                </div>
            );
        }

        // ================================================================
        // DÉPENSES
        // ================================================================
        function Expenses({ list, set }) {
            const [f, setF] = useState({ l: '', a: '' });

            const add = () => {
                if (!f.l || !f.a) return showToast("Remplissez tous les champs", "error");
                set([{ id: Date.now(), label: f.l, amount: Number(f.a), date: new Date() }, ...list]);
                setF({ l: '', a: '' });
                showToast("Dépense enregistrée", "success");
            };

            return (
                <div className="space-y-4">
                    <h2 className="text-2xl font-black uppercase text-slate-800 tracking-tighter">Dépenses</h2>
                    <div className="bg-white p-6 rounded-3xl shadow-sm border space-y-4 max-w-lg">
                        <input placeholder="Libellé..." value={f.l} onChange={e => setF({...f, l: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl outline-none font-bold text-sm" />
                        <input type="number" placeholder="Montant" value={f.a} onChange={e => setF({...f, a: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-2xl outline-none font-black text-red-600 text-sm" />
                        <button onClick={add} className="w-full py-3 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest text-xs">Enregistrer</button>
                    </div>
                    <div className="bg-white rounded-3xl overflow-hidden border">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b"><tr><th className="p-3">Type</th><th>Date</th><th className="text-right p-3">Montant</th></tr></thead>
                            <tbody>{list.map(e => <tr key={e.id} className="border-b font-bold"><td className="p-3">{e.label}</td><td className="text-xs text-slate-300">{new Date(e.date).toLocaleDateString()}</td><td className="text-right p-3 text-red-500">-{e.amount} F</td></tr>)}</tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ================================================================
        // DETTES
        // ================================================================
        function Debt({ sales, setSales }) {
            const [debtPayments, setDebtPayments] = useState(() => JSON.parse(localStorage.getItem('aziz_debt_payments') || '{}'));
            const [selectedDebt, setSelectedDebt] = useState(null);
            const [partialAmount, setPartialAmount] = useState('');
            const deb = sales.filter(s => s.payMethod === 'credit' && s.status === 'active');

            const markPaid = (id) => {
                if (!confirm("Paiement intégral ?")) return;
                setSales(v => v.map(x => x.id === id ? { ...x, payMethod: 'cash', paidAt: new Date().toISOString() } : x));
                setDebtPayments(prev => { delete prev[id]; return prev; });
                localStorage.setItem('aziz_debt_payments', JSON.stringify(debtPayments));
                showToast("Dette payée", "success");
            };

            const addPartialPayment = (debtId, amount) => {
                const amt = Number(amount);
                if (amt <= 0) return showToast("Montant invalide", "error");
                const debt = deb.find(d => d.id === debtId);
                if (!debt) return;
                const paid = debtPayments[debtId] || 0;
                if (paid + amt > debt.total) return showToast("Dépasse le total", "error");
                const newPayments = { ...debtPayments, [debtId]: paid + amt };
                setDebtPayments(newPayments);
                localStorage.setItem('aziz_debt_payments', JSON.stringify(newPayments));
                setPartialAmount('');
                showToast("Paiement partiel enregistré", "success");
                if (paid + amt >= debt.total) {
                    if (confirm("Tranches complètes ! Marquer comme payée ?")) markPaid(debtId);
                }
            };

            return (
                <div className="space-y-4">
                    <div className="bg-orange-600 p-8 rounded-3xl text-white shadow-2xl text-center">
                        <h4 className="font-bold text-xl mb-1 uppercase tracking-tighter">Total à Recouvrer</h4>
                        <p className="text-4xl font-black">{deb.reduce((s,x)=>s+x.total, 0).toLocaleString()} F</p>
                    </div>
                    <div className="bg-white rounded-3xl overflow-hidden border">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b"><tr><th className="p-3">Client</th><th>Date</th><th className="text-right p-3">Montant</th><th className="text-right p-3">Action</th></tr></thead>
                            <tbody>{deb.length === 0 ? (
                                <tr><td colSpan="4" className="p-10 text-center text-slate-400 font-bold text-sm">Aucune dette 🎉</td></tr>
                            ) : deb.map(s => {
                                const paidAmount = debtPayments[s.id] || 0;
                                return (
                                <React.Fragment key={s.id}>
                                    <tr className="border-b font-bold">
                                        <td className="p-3 text-orange-600 uppercase italic">{(s.customer || 'Inconnu').substring(0,20)}</td>
                                        <td className="text-xs text-slate-300">{new Date(s.date).toLocaleDateString()}</td>
                                        <td className="text-right p-3 font-black">{s.total} F {paidAmount > 0 && <span className="text-xs text-emerald-600">(-{paidAmount}F)</span>}</td>
                                        <td className="p-2 text-right">
                                            <div className="flex gap-1 justify-end">
                                                {selectedDebt === s.id ? (
                                                    <div className="flex gap-1">
                                                        <input type="number" value={partialAmount} onChange={e=>setPartialAmount(e.target.value)} placeholder="Montant" className="w-20 px-1 py-0.5 text-xs rounded border" />
                                                        <button onClick={() => addPartialPayment(s.id, partialAmount)} className="px-2 py-0.5 bg-blue-600 text-white text-[9px] font-black rounded"><Icon name="plus" size={12}/></button>
                                                        <button onClick={() => setSelectedDebt(null)} className="px-2 py-0.5 bg-slate-400 text-white text-[9px] rounded"><Icon name="x" size={12}/></button>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <button onClick={() => setSelectedDebt(s.id)} className="px-2 py-0.5 bg-blue-600 text-white rounded text-[9px] font-black"><Icon name="split" size={12}/></button>
                                                        <button onClick={() => markPaid(s.id)} className="px-2 py-0.5 bg-emerald-600 text-white rounded text-[9px] font-black flex items-center gap-0.5"><Icon name="check" size={12}/>Payée</button>
                                                    </>
                                                )}
                                            </div>
                                        </td>
                                    </tr>
                                    {paidAmount > 0 && (
                                        <tr className="bg-blue-50 border-b text-xs text-slate-600">
                                            <td colSpan="4" className="p-2 italic text-center">Paiement(s) : {paidAmount}F / Reste : {s.total - paidAmount}F</td>
                                        </tr>
                                    )}
                                </React.Fragment>
                            )})}</tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ================================================================
        // RAPPORTS
        // ================================================================
        function Reports({ sales, expenses, products }) {
            const [period, setPeriod] = useState('week');

            const filterData = (data, p) => {
                const now = new Date();
                return data.filter(item => {
                    const d = new Date(item.date);
                    if (p === 'day') return d.toDateString() === now.toDateString();
                    if (p === 'week') {
                        const start = new Date(now); start.setDate(now.getDate() - now.getDay()); start.setHours(0,0,0,0);
                        return d >= start;
                    }
                    if (p === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                    if (p === 'year') return d.getFullYear() === now.getFullYear();
                    return true;
                });
            };

            const periodSales = filterData(sales.filter(s => s.status === 'active'), period);
            const periodExpenses = filterData(expenses, period);

            const totalRev = periodSales.reduce((s, x) => s + x.total, 0);
            const totalProfit = periodSales.reduce((s, x) => s + x.profit, 0);
            const totalExp = periodExpenses.reduce((s, x) => s + x.amount, 0);
            const netResult = totalProfit - totalExp;

            const productStats = {};
            periodSales.forEach(s => {
                s.items.forEach(it => {
                    if (!productStats[it.pid]) productStats[it.pid] = { name: it.pname, qty: 0, revenue: 0, profit: 0 };
                    productStats[it.pid].qty += it.q;
                    productStats[it.pid].revenue += it.lineNet || it.total;
                    productStats[it.pid].profit += it.lineProfit || 0;
                });
            });
            const topProducts = Object.values(productStats).sort((a,b) => b.profit - a.profit).slice(0, 5);

            return (
                <div className="space-y-4 pb-20">
                    <header className="flex flex-wrap justify-between items-center gap-3">
                        <div><h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Rapports</h2></div>
                        <div className="flex flex-wrap gap-1 bg-white p-1 rounded-2xl border">
                            {['day','week','month','year'].map(p => (
                                <button key={p} onClick={() => setPeriod(p)} className={`px-3 py-1.5 rounded-xl text-[10px] font-black uppercase transition-all ${period===p?'bg-blue-600 text-white shadow-lg':'text-slate-400 hover:bg-slate-50'}`}>
                                    {p === 'day' ? 'Jour' : p === 'week' ? 'Semaine' : p === 'month' ? 'Mois' : 'Année'}
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div className="bg-white p-4 rounded-2xl border"><p className="text-[10px] font-black text-slate-400 uppercase">CA</p><p className="text-xl font-black">{totalRev.toLocaleString()} F</p></div>
                        <div className="bg-white p-4 rounded-2xl border border-l-4 border-l-blue-500"><p className="text-[10px] font-black text-slate-400 uppercase">Marge</p><p className="text-xl font-black text-blue-600">{totalProfit.toLocaleString()} F</p></div>
                        <div className="bg-white p-4 rounded-2xl border border-l-4 border-l-red-500"><p className="text-[10px] font-black text-slate-400 uppercase">Dépenses</p><p className="text-xl font-black text-red-500">{totalExp.toLocaleString()} F</p></div>
                        <div className={`bg-white p-4 rounded-2xl border border-l-4 ${netResult >= 0 ? 'border-l-green-500' : 'border-l-orange-500'}`}><p className="text-[10px] font-black text-slate-400 uppercase">Bénéfice Net</p><p className={`text-xl font-black ${netResult >= 0 ? 'text-green-600' : 'text-orange-600'}`}>{netResult.toLocaleString()} F</p></div>
                    </div>

                    <div className="bg-white rounded-3xl border shadow-sm p-6">
                        <h3 className="text-sm font-black uppercase tracking-widest text-slate-800 mb-4 flex items-center gap-2"><Icon name="trophy" className="text-yellow-500" /> Top Produits</h3>
                        {topProducts.length === 0 && <p className="text-center py-6 text-slate-300 italic">Aucune donnée</p>}
                        {topProducts.map((p, i) => (
                            <div key={i} className="flex items-center justify-between py-2 border-b border-slate-50 last:border-0">
                                <div className="flex items-center gap-3"><span className="w-6 h-6 bg-slate-200 rounded-full flex items-center justify-center text-xs font-black">{i+1}</span><span className="font-bold text-sm">{p.name}</span></div>
                                <div className="text-right"><span className="text-xs text-emerald-600 font-black">{Math.round((p.profit/(p.revenue||1))*100)}% marge</span> <span className="ml-3 text-sm font-black">{Math.round(p.profit).toLocaleString()} F</span></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ================================================================
        // ACTIVITÉS
        // ================================================================
        function ActivityLogs({ activities, logs, onPrint, showSeller }) {
            const totalProfitEver = logs.reduce((s, x) => s + x.profit, 0);

            return (
                <div className="space-y-4">
                    <header className="flex justify-between items-center bg-slate-900 p-6 rounded-3xl text-white overflow-hidden relative">
                        <div className="relative z-10"><h2 className="text-2xl font-black uppercase tracking-tighter">Journal d'Activité</h2><p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-1">Historique des reçus</p></div>
                        <div className="text-right relative z-10"><p className="text-[10px] font-black text-slate-400 uppercase mb-1">Bénéfice Cumulé</p><p className="text-2xl font-black text-white">{totalProfitEver.toLocaleString()} F</p></div>
                    </header>

                    <div className="bg-white rounded-3xl border shadow-sm overflow-hidden">
                        <div className="p-4 border-b bg-slate-50 flex items-center gap-3"><Icon name="history" className="text-slate-400" /><h3 className="text-xs font-black uppercase tracking-widest">Reçus Authentifiés</h3></div>
                        <div className="divide-y divide-slate-100 max-h-[500px] overflow-y-auto custom-scroll">
                            {activities.map((a, i) => (
                                <div key={i} className="p-3 hover:bg-slate-50 transition-all flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 font-bold text-xs">#{a.num}</div>
                                        <div><p className="text-sm font-black text-slate-800">{a.total.toLocaleString()} F</p><p className="text-[9px] font-bold text-slate-400 uppercase">{new Date(a.date).toLocaleString()} {showSeller && a.sellerName ? `• ${a.sellerName}` : ''}</p></div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => onPrint(a)} className="p-2 text-blue-600 hover:bg-blue-50 rounded-xl"><Icon name="printer" size={16}/></button>
                                        <span className={`px-2 py-0.5 rounded-full text-[8px] font-black uppercase ${a.status === 'active' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>{a.status === 'active' ? 'Validé' : 'Annulé'}</span>
                                    </div>
                                </div>
                            ))}
                            {!activities.length && <div className="py-20 text-center text-slate-300 italic">Aucune activité</div>}
                        </div>
                    </div>
                </div>
            );
        }

        // ================================================================
        // EMPLOYÉS
        // ================================================================
        function Employees({ users, setUsers, sales, currentUser }) {
            const [showForm, setShowForm] = useState(false);
            const [editing, setEditing] = useState(null);
            const [form, setForm] = useState({ name: '', username: '', pwd: '', role: 'employee', permissions: DEFAULT_EMP_PERMS });

            const open = (u) => {
                if (u) { setEditing(u); setForm({ name: u.name, username: u.username, pwd: '', role: u.role, permissions: u.permissions || DEFAULT_EMP_PERMS }); }
                else { setEditing(null); setForm({ name: '', username: '', pwd: '', role: 'employee', permissions: DEFAULT_EMP_PERMS }); }
                setShowForm(true);
            };

            const togglePerm = (p) => setForm(f => ({ ...f, permissions: f.permissions.includes(p) ? f.permissions.filter(x=>x!==p) : [...f.permissions, p] }));

            const save = () => {
                if (!form.name.trim() || !form.username.trim()) return showToast("Nom et identifiant requis", "error");
                const uname = form.username.trim().toLowerCase();
                if (users.some(u => u.username === uname && u.id !== editing?.id)) return showToast("Identifiant existe déjà", "error");
                const perms = form.role === 'admin' ? ALL_PERMS : form.permissions;
                if (editing) {
                    setUsers(users.map(u => u.id === editing.id ? { ...u, name: form.name.trim(), username: uname, role: form.role, permissions: perms, ...(form.pwd ? { passwordHash: hashPwd(form.pwd) } : {}) } : u));
                    showToast("Employé modifié", "success");
                } else {
                    if (!form.pwd || form.pwd.length < 4) return showToast("Mot de passe: 4 caractères min", "error");
                    const nu = { id: 'U-' + Date.now(), name: form.name.trim(), username: uname, passwordHash: hashPwd(form.pwd), role: form.role, permissions: perms, active: true, createdAt: new Date().toISOString() };
                    setUsers([...users, nu]);
                    showToast(`Compte ${form.role === 'admin' ? 'admin' : 'caissier'} créé`, "success");
                }
                setShowForm(false);
            };

            const toggleActive = (u) => setUsers(users.map(x => x.id === u.id ? { ...x, active: x.active === false ? true : false } : x));
            const remove = (u) => {
                if (u.id === currentUser.id) return showToast("Vous ne pouvez pas supprimer votre compte", "error");
                if (u.role === 'admin' && users.filter(x => x.role === 'admin').length <= 1) return showToast("Il faut au moins un admin", "error");
                if (!confirm(`Supprimer ${u.name} ?`)) return;
                setUsers(users.filter(x => x.id !== u.id));
                showToast("Employé supprimé", "success");
            };

            return (
                <div className="space-y-4">
                    <header className="flex justify-between items-center bg-slate-900 p-6 rounded-3xl text-white shadow-xl">
                        <div><h2 className="text-2xl font-black uppercase tracking-tighter">Employés</h2><p className="text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-1">{users.length} compte(s)</p></div>
                        <button onClick={() => open(null)} className="px-4 py-3 bg-blue-600 rounded-2xl font-black uppercase text-xs shadow-lg flex items-center gap-2"><Icon name="user-plus" size={14}/> Nouveau</button>
                    </header>
                    <div className="grid gap-3 md:grid-cols-2">
                        {users.map(u => {
                            const st = { count: sales.filter(s => s.sellerId === u.id && s.status === 'active').length, total: sales.filter(s => s.sellerId === u.id && s.status === 'active').reduce((s,x)=>s+x.total,0) };
                            return (
                                <div key={u.id} className={`p-4 bg-white rounded-2xl border ${u.active === false ? 'opacity-60' : ''} shadow-sm`}>
                                    <div className="flex items-start gap-3">
                                        <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-white ${u.role === 'admin' ? 'bg-emerald-600' : 'bg-amber-600'}`}><Icon name={u.role === 'admin' ? 'shield' : 'user'} size={20}/></div>
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 flex-wrap"><h3 className="font-black text-slate-800">{u.name}</h3><span className={`px-2 py-0.5 rounded-full text-[8px] font-black uppercase ${u.role === 'admin' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>{u.role === 'admin' ? 'Admin' : 'Caissier'}</span>{u.active === false && <span className="px-2 py-0.5 rounded-full text-[8px] font-black uppercase bg-red-100 text-red-700">Inactif</span>}</div>
                                            <p className="text-xs text-slate-400 font-bold">@{u.username}</p>
                                            <div className="mt-2 flex gap-3 text-[10px] font-bold text-slate-500"><span><span className="text-slate-800 font-black">{st.count}</span> ventes</span><span><span className="text-slate-800 font-black">{st.total.toLocaleString()} F</span> encaissés</span></div>
                                        </div>
                                    </div>
                                    <div className="flex gap-1 mt-3">

        function InstallAppButton() {
            const [available, setAvailable] = useState(!!window.__deferredInstall);
            const [dismissed, setDismissed] = useState(localStorage.getItem('aziz_install_dismissed') === '1');

            useEffect(() => {
                const onAvail = () => setAvailable(true);
                const onInst = () => setAvailable(false);
                window.addEventListener('aziz-install-available', onAvail);
                window.addEventListener('appinstalled', onInst);
                return () => {
                    window.removeEventListener('aziz-install-available', onAvail);
                    window.removeEventListener('appinstalled', onInst);
                };
            }, []);

            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            if (isStandalone || dismissed || !available) return null;

            const install = async () => {
                if (window.__deferredInstall) {
                    window.__deferredInstall.prompt();
                    try { await window.__deferredInstall.userChoice; } catch {}
                    window.__deferredInstall = null;
                    setAvailable(false);
                    showToast("Installation réussie", "success");
                }
            };

            return (
                <div className="fixed bottom-14 right-3 z-50 print:hidden">
                    <button onClick={install} className="bg-blue-600 text-white rounded-2xl shadow-2xl px-3 py-2 text-[10px] font-black uppercase tracking-wider flex items-center gap-2">
                        <Icon name="download" size={14}/> Installer
                    </button>
                </div>
            );
        }
