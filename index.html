                const params = new URLSearchParams(window.location.search);
                let shopId = params.get('shop');
                if (!shopId && window.location.hash) shopId = window.location.hash.slice(1).replace('shop-', '');
                if (shopId) {
                    const shops = storage.get(KEYS.SHOPS, []);
                    const found = shops.find(s => s.id === shopId || s.id === Number(shopId));
                    if (found) return found;
                }
                return storage.get(KEYS.SHOP, null);
            });
            const [autoPrint, setAutoPrint] = useState(() => storage.get('auto_print', true));
            const [logs, setLogs] = useState(() => storage.get('logs', []));
            const [activities, setActivities] = useState(() => storage.get('activities', []));
            const [globalReceipt, setGlobalReceipt] = useState(null);
            const [users, setUsers] = useState(() => storage.get(KEYS.USERS, []));
            const [currentUser, setCurrentUser] = useState(() => storage.get(KEYS.CURRENT_USER, null));
            const [suppliers, setSuppliers] = useState(() => storage.get(KEYS.SUPPLIERS, []));
            const [purchases, setPurchases] = useState(() => storage.get(KEYS.PURCHASES, []));
            const [customers, setCustomers] = useState(() => storage.get(KEYS.CUSTOMERS, []));
            const [audit, setAudit] = useState(() => storage.get(KEYS.AUDIT, []));
            const [shops, setShops] = useState(() => storage.get(KEYS.SHOPS, []));

            // Persistance
            useEffect(() => { storage.set(KEYS.PRODUCTS, products); AzizPro.storage.save(KEYS.PRODUCTS, products); }, [products]);
            useEffect(() => { storage.set(KEYS.SALES, sales); AzizPro.storage.save(KEYS.SALES, sales); }, [sales]);
            useEffect(() => { storage.set(KEYS.EXPENSES, expenses); AzizPro.storage.save(KEYS.EXPENSES, expenses); }, [expenses]);
            useEffect(() => { storage.set(KEYS.SHOP, shop); AzizPro.storage.save(KEYS.SHOP, shop); }, [shop]);
            useEffect(() => { storage.set('auto_print', autoPrint); }, [autoPrint]);
            useEffect(() => { storage.set('logs', logs); }, [logs]);
            useEffect(() => { storage.set('activities', activities); }, [activities]);
            useEffect(() => { storage.set(KEYS.USERS, users); }, [users]);
            useEffect(() => { storage.set(KEYS.CURRENT_USER, currentUser); }, [currentUser]);
            useEffect(() => { storage.set(KEYS.SUPPLIERS, suppliers); }, [suppliers]);
            useEffect(() => { storage.set(KEYS.PURCHASES, purchases); }, [purchases]);
            useEffect(() => { storage.set(KEYS.CUSTOMERS, customers); }, [customers]);
            useEffect(() => { storage.set(KEYS.AUDIT, audit); }, [audit]);
            useEffect(() => { storage.set(KEYS.SHOPS, shops); }, [shops]);

            // Lucide
            useEffect(() => { if (window.lucide) try { window.lucide.createIcons(); } catch(e) {} });

            // PWA
            useEffect(() => {
                const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); setShowInstall(true); };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstall = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') { setDeferredPrompt(null); setShowInstall(false); showToast("Installé !", "success"); }
            };

            // Restauration cloud
            useEffect(() => {
                if (!shop?.id) return;
                const flag = `aziz_restored_${shop.id}`;
                if (sessionStorage.getItem(flag)) return;
                sessionStorage.setItem(flag, '1');
                AzizPro.storage.load(KEYS.PRODUCTS).then(data => { if (data) setProducts(data); });
                AzizPro.storage.load(KEYS.SALES).then(data => { if (data) setSales(data); });
                AzizPro.storage.load(KEYS.EXPENSES).then(data => { if (data) setExpenses(data); });
            }, [shop?.id]);

            // Log Audit
            const logAudit = (action, details) => {
                setAudit(prev => [{ id: Date.now(), date: new Date().toISOString(), userId: currentUser?.id || 'system', userName: currentUser?.name || 'Système', action, details }, ...prev].slice(0, 2000));
            };

            // Vente
            const onSale = useCallback((s) => {
                const stamped = { ...s, sellerId: currentUser?.id || null, sellerName: currentUser?.name || 'Admin', sellerRole: currentUser?.role || 'admin' };
                setSales(prev => [stamped, ...prev]);
                setLogs(prev => [{ date: stamped.date, profit: stamped.profit, total: stamped.total, sellerName: stamped.sellerName }, ...prev].slice(0, 500));
                setActivities(prev => [{ ...stamped, logId: Date.now() }, ...prev].slice(0, 200));
                setProducts(prev => prev.map(p => {
                    const item = stamped.items.find(it => it.pid === p.id);
                    if (!item) return p;
                    return { ...p, stock: Math.max(0, Number((p.stock - item.qtyBase).toFixed(3))) };
                }));
                if (stamped.customerId) {
                    const pts = Math.floor(stamped.total / 1000);
                    setCustomers(prev => prev.map(c => c.id === stamped.customerId ? { ...c, points: (c.points || 0) + pts, totalSpent: (c.totalSpent || 0) + stamped.total, lastVisit: stamped.date } : c));
                }
                logAudit('VENTE', `#${stamped.num} - ${stamped.total} F`);
                setGlobalReceipt({ ...stamped, _auto: autoPrint });
            }, [currentUser, autoPrint]);

            // Produits
            const addProduct = (p) => { setProducts(prev => [p, ...prev]); logAudit('PRODUIT_AJOUT', p.name); };
            const updateProduct = (p) => { setProducts(prev => prev.map(x => x.id === p.id ? p : x)); logAudit('PRODUIT_MODIF', p.name); };
            const deleteProduct = (id) => { setProducts(prev => prev.filter(x => x.id !== id)); logAudit('PRODUIT_SUPPR', id); };

            // Réception
            const receivePurchase = (po) => {
                setProducts(prev => prev.map(p => {
                    const line = po.items.find(i => i.pid === p.id);
                    if (!line) return p;
                    return { ...p, stock: Number((p.stock + line.qty).toFixed(3)) };
                }));
                setPurchases(prev => [{ ...po, id: Date.now(), date: new Date().toISOString(), receivedBy: currentUser?.name }, ...prev]);
                logAudit('REAPPRO', `${po.supplierName}`);
            };

            // Navigation
            const navigate = (v) => { setView(v); setMenuOpen(false); };
            const logout = () => { logAudit('LOGOUT'); setCurrentUser(null); setView('dashboard'); };

            // États
            const isEmployee = currentUser && currentUser.role === 'employee';
            const userPerms = currentUser ? (currentUser.role === 'admin' ? ALL_PERMS : (currentUser.permissions || DEFAULT_EMP_PERMS)) : [];
            const can = (p) => userPerms.includes(p);
            const canSeeView = (v) => currentUser?.role === 'admin' || can({ dashboard:'reports', pos:'pos', stock:'stock_view', history:'pos', expenses:'expenses', debt:'debt', reports:'reports', employees:'employees', settings:'settings', suppliers:'suppliers', customers:'customers', audit:'audit', activities:'pos' }[v] || v);
            const effectiveView = canSeeView(view) ? view : 'pos';

            // Sync manuelle
            const handleManualSync = () => {
                showToast('Synchronisation...', 'info');
                Promise.all([
                    AzizPro.storage.save(KEYS.PRODUCTS, products),
                    AzizPro.storage.save(KEYS.SALES, sales),
                    AzizPro.storage.save(KEYS.EXPENSES, expenses)
                ]).then(() => showToast('Synchronisé ✅', 'success')).catch(() => showToast('Erreur', 'error'));
            };

            // Rendu
            if (!shop) return <ShopSetup onComplete={(s) => { setShop(s); setShops(prev => [...prev, s]); }} />;
            if (!users.length) return <FirstAdminSetup onComplete={(u) => { setUsers([u]); setCurrentUser(u); }} />;
            if (!currentUser) return <AuthScreen users={users} onLogin={(u)=>{ setCurrentUser(u); logAudit('LOGIN', u.name); }} shop={shop} />;

            const visibleSales = (isEmployee && !can('history_all')) ? sales.filter(s => s.sellerId === currentUser.id) : sales;
            const visibleActivities = (isEmployee && !can('history_all')) ? activities.filter(a => a.sellerId === currentUser.id) : activities;

            return (
                <div className="h-screen flex flex-col md:flex-row relative overflow-hidden">
                    <nav className={`fixed inset-y-0 left-0 w-64 bg-slate-900 p-4 flex flex-col gap-1 border-r border-slate-800 z-[100] transition-transform duration-300 md:relative md:translate-x-0 ${menuOpen ? 'translate-x-0' : '-translate-x-full'} print:hidden text-slate-400 overflow-y-auto`}>
                        {showInstall && <button onClick={handleInstall} className="w-full py-2 px-3 bg-blue-600 text-white text-[10px] font-black uppercase rounded-lg mb-3 hover:shadow-lg flex items-center gap-2"><Icon name="download" size={14}/> Installer</button>}

                        <div className="p-4 mb-4 bg-slate-800/50 rounded-2xl border border-slate-700/50 flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-black shrink-0"><Icon name="store" size={20}/></div>
                            <div className="min-w-0 flex-1"><h1 className="text-white font-black text-sm truncate">{shop?.name || 'AZIZ-PRO'}</h1><p className="text-[8px] font-bold text-blue-400 uppercase tracking-widest">Gestion Boutique</p></div>
                            <button onClick={() => setMenuOpen(false)} className="md:hidden text-white shrink-0"><Icon name="x"/></button>
                        </div>

                        <div className="p-3 mb-4 rounded-2xl border bg-slate-800/30 border-slate-700/30 flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-blue-600/30 flex items-center justify-center text-white font-black"><Icon name={isEmployee ? 'user' : 'shield'} size={18}/></div>
                            <div className="flex-1 min-w-0"><p className="text-[8px] font-black text-slate-400 uppercase tracking-widest">{isEmployee ? 'Caissier' : 'Admin'}</p><p className="text-white font-bold text-sm truncate">{currentUser.name}</p></div>
                            <button onClick={logout} className="p-2 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg"><Icon name="log-out" size={16}/></button>
                        </div>

                        {canSeeView('dashboard') && <NavItem active={effectiveView==='dashboard'} icon="layout-dashboard" label="Dashboard" onClick={()=>navigate('dashboard')} />}
                        {canSeeView('pos') && <NavItem active={effectiveView==='pos'} icon="shopping-cart" label="Caisse" onClick={()=>navigate('pos')} />}
                        {canSeeView('stock') && <NavItem active={effectiveView==='stock'} icon="package" label="Stock" onClick={()=>navigate('stock')} badge={products.filter(p => p.stock <= p.minStock).length} />}
                        {canSeeView('suppliers') && <NavItem active={effectiveView==='suppliers'} icon="truck" label="Fournisseurs" onClick={()=>navigate('suppliers')} />}
                        {canSeeView('history') && <NavItem active={effectiveView==='history'} icon="history" label="Historique" onClick={()=>navigate('history')} />}
                        {canSeeView('expenses') && <NavItem active={effectiveView==='expenses'} icon="credit-card" label="Dépenses" onClick={()=>navigate('expenses')} />}
                        {canSeeView('debt') && <NavItem active={effectiveView==='debt'} icon="coins" label="Dettes" onClick={()=>navigate('debt')} />}
                        {canSeeView('customers') && <NavItem active={effectiveView==='customers'} icon="user-circle" label="Clients" onClick={()=>navigate('customers')} />}
                        {canSeeView('reports') && <NavItem active={effectiveView==='reports'} icon="bar-chart-3" label="Rapports" onClick={()=>navigate('reports')} />}
                        {canSeeView('activities') && <NavItem active={effectiveView==='activities'} icon="list-checks" label="Activités" onClick={()=>navigate('activities')} />}
                        {canSeeView('audit') && <NavItem active={effectiveView==='audit'} icon="shield-check" label="Audit" onClick={()=>navigate('audit')} />}
                        {canSeeView('employees') && <NavItem active={effectiveView==='employees'} icon="users" label="Employés" onClick={()=>navigate('employees')} />}
                        {canSeeView('settings') && <NavItem active={effectiveView==='settings'} icon="settings" label="Paramètres" onClick={()=>navigate('settings')} />}
                    </nav>

                    <main className="flex-1 h-screen overflow-y-auto p-4 md:p-6 custom-scroll bg-slate-50 relative print:hidden">
                        <header className="flex md:hidden items-center justify-between p-2 mb-4 bg-white rounded-2xl border border-slate-100 shadow-sm sticky top-0 z-40">
                            <button onClick={() => setMenuOpen(true)} className="p-3 bg-slate-900 text-white rounded-xl"><Icon name="menu"/></button>
                            <div className="text-right"><h3 className="text-xs font-black uppercase tracking-tighter">{shop.name}</h3><p className="text-[8px] font-bold text-blue-500 uppercase">{currentUser.name} • {effectiveView}</p></div>
                        </header>

                        <ExpiryAlertBanner products={products} />

                        {effectiveView === 'dashboard' && <Dashboard products={products} sales={sales} expenses={expenses} />}
                        {effectiveView === 'pos' && <POS products={products} onSale={onSale} autoPrint={autoPrint} setAutoPrint={setAutoPrint} customers={customers} setCustomers={setCustomers} />}
                        {effectiveView === 'stock' && <Stock items={products} onAdd={addProduct} onEdit={updateProduct} onDelete={deleteProduct} onGoToSale={() => setView('pos')} readOnly={!can('stock_edit') && currentUser.role !== 'admin'} />}
                        {effectiveView === 'suppliers' && <Suppliers suppliers={suppliers} setSuppliers={setSuppliers} purchases={purchases} products={products} onReceive={receivePurchase} />}
                        {effectiveView === 'history' && <History sales={visibleSales} setSales={setSales} setProducts={setProducts} onPrint={setGlobalReceipt} readOnly={isEmployee} />}
                        {effectiveView === 'expenses' && <Expenses list={expenses} set={setExpenses} />}
                        {effectiveView === 'debt' && <Debt sales={sales} setSales={setSales} />}
                        {effectiveView === 'customers' && <Customers customers={customers} setCustomers={setCustomers} sales={sales} />}
                        {effectiveView === 'reports' && <Reports sales={sales} expenses={expenses} products={products} />}
                        {effectiveView === 'activities' && <ActivityLogs activities={visibleActivities} logs={isEmployee ? logs.filter(l => l.sellerName === currentUser.name) : logs} onPrint={setGlobalReceipt} showSeller={!isEmployee} />}
                        {effectiveView === 'audit' && <AuditView audit={audit} />}
                        {effectiveView === 'employees' && <Employees users={users} setUsers={setUsers} sales={sales} currentUser={currentUser} />}
                        {effectiveView === 'settings' && <Settings storage={storage} products={products} sales={sales} expenses={expenses} shop={shop} setShop={setShop} shops={shops} setShops={setShops} logs={logs} activities={activities} suppliers={suppliers} purchases={purchases} customers={customers} audit={audit} logout={logout} currentUser={currentUser} onManualSync={handleManualSync} />}
                    </main>

                    {globalReceipt && <ReceiptModal data={globalReceipt} onClose={() => setGlobalReceipt(null)} shop={shop} />}
                    <CloudStatusPill />
                    <InstallAppButton />
                    <ToastContainer />
                </div>
            );
        }

        // ================================================================
        // EXPIRY ALERT
        // ================================================================
        function ExpiryAlertBanner({ products }) {
            const today = new Date();
            const soon = products.filter(p => p.expiryDate && (new Date(p.expiryDate) - today) / 86400000 <= 30 && (new Date(p.expiryDate) - today) / 86400000 >= 0);
            const expired = products.filter(p => p.expiryDate && new Date(p.expiryDate) < today);
            const low = products.filter(p => p.stock <= p.minStock);
            if (!soon.length && !expired.length && !low.length) return null;
            return (
                <div className="mb-3 space-y-1.5">
                    {expired.length > 0 && <div className="p-2 bg-red-50 border border-red-200 rounded-xl text-[10px] font-bold text-red-700 flex items-center gap-2"><Icon name="alert-octagon" size={14}/> {expired.length} PÉRIMÉ(S)</div>}
                    {soon.length > 0 && <div className="p-2 bg-amber-50 border border-amber-200 rounded-xl text-[10px] font-bold text-amber-700 flex items-center gap-2"><Icon name="clock" size={14}/> {soon.length} périment dans 30 jours</div>}
                    {low.length > 0 && <div className="p-2 bg-orange-50 border border-orange-200 rounded-xl text-[10px] font-bold text-orange-700 flex items-center gap-2"><Icon name="alert-triangle" size={14}/> {low.length} en stock faible</div>}
                </div>
            );
        }

        // ================================================================
        // RENDU FINAL
        // ================================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
